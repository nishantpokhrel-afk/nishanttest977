<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cogniss AI Chatbot</title>
<style>
  :root {
    --color-primary: #6c47ff;
    --color-secondary: #a78bfa;
    --color-dark: #1e1b4b;
    --color-light: #f5f3ff;
    --color-background: #ffffff;
    --border-radius: 12px;
    --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-family);
    background: var(--color-background, #fff);
    color: var(--color-dark, #1e1b4b);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    background: var(--color-primary, #6c47ff);
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  #header .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  #header .info { flex: 1; }
  #header .name { font-weight: 700; font-size: 15px; }
  #header .sub { font-size: 11px; opacity: .8; margin-top: 1px; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; margin-top: 2px;
    display: inline-block; margin-right: 4px;
    transition: background .3s;
  }
  #status-dot.thinking { background: #fbbf24; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 88%;
    animation: fadeUp .25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { margin-left: auto; flex-direction: row-reverse; }

  .msg .bubble {
    padding: 10px 14px;
    border-radius: var(--border-radius, 12px);
    font-size: 14px;
    line-height: 1.55;
    max-width: 100%;
    word-break: break-word;
  }

  .msg.bot .bubble {
    background: var(--color-light, #f5f3ff);
    color: var(--color-dark, #1e1b4b);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--color-primary, #6c47ff);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg .icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--color-primary, #6c47ff);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg.user .icon { background: var(--color-secondary, #a78bfa); }

  /* Reference chips */
  .ref-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .ref-chip {
    background: var(--color-primary, #6c47ff);
    color: #fff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
    white-space: nowrap;
  }
  .ref-chip:hover { opacity: .8; }

  /* Typing indicator */
  .typing-bubble {
    background: var(--color-light, #f5f3ff);
    border-radius: var(--border-radius, 12px);
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex; gap: 5px; align-items: center;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--color-secondary, #a78bfa);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* ── Input ── */
  #input-area {
    padding: 10px 12px;
    border-top: 1px solid rgba(0,0,0,.08);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--color-background, #fff);
    flex-shrink: 0;
  }
  #input {
    flex: 1;
    border: 1.5px solid rgba(0,0,0,.12);
    border-radius: 22px;
    padding: 9px 16px;
    font-size: 14px;
    font-family: var(--font-family);
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    background: var(--color-light, #f5f3ff);
    color: var(--color-dark, #1e1b4b);
    transition: border-color .2s;
  }
  #input:focus { border-color: var(--color-primary, #6c47ff); }
  #input::placeholder { color: #999; }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--color-primary, #6c47ff);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s, transform .15s;
  }
  #send-btn:disabled { opacity: .45; cursor: default; }
  #send-btn:not(:disabled):hover { opacity: .85; transform: scale(1.05); }

  /* ── Loading screen ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--color-background, #fff);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    z-index: 99;
  }
  #loading .spinner {
    width: 42px; height: 42px;
    border: 3px solid var(--color-light, #f5f3ff);
    border-top-color: var(--color-primary, #6c47ff);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 13px; color: #888; }

  #done-btn {
    margin: 10px auto;
    display: none;
    padding: 10px 28px;
    background: var(--color-primary, #6c47ff);
    color: #fff;
    border: none;
    border-radius: 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  #done-btn:hover { opacity: .85; }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 4px; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>Loading your assistant…</p>
</div>

<!-- Header -->
<div id="header">
  <div class="avatar">🤖</div>
  <div class="info">
    <div class="name" id="bot-name">App Assistant</div>
    <div class="sub"><span id="status-dot"></span><span id="status-text">Ready to help</span></div>
  </div>
</div>

<!-- Messages -->
<div id="messages"></div>

<!-- Done button (display-only mode) -->
<button id="done-btn" onclick="finish()">Done</button>

<!-- Input -->
<div id="input-area">
  <textarea id="input" placeholder="Ask me anything about this app…" rows="1"></textarea>
  <button id="send-btn" disabled onclick="sendMessage()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
// ─────────────────────────────────────────
// Bridge Setup
// ─────────────────────────────────────────
const isNative = typeof window.ReactNativeWebView !== 'undefined'

function postToApp(key, data = null) {
  const text = JSON.stringify({ key, data })
  if (isNative) window.ReactNativeWebView.postMessage(text)
  else window.parent.postMessage(text, '*')
}

let _reqId = 0
const _pending = {}

function restRequest(method, model, data, specialParams) {
  return new Promise((resolve, reject) => {
    const id = 'req-' + (++_reqId)
    _pending[id] = { resolve, reject }
    const text = JSON.stringify({ key: 'REST_REQUEST', method, model, data, id, specialParams: specialParams || null })
    if (isNative) window.ReactNativeWebView.postMessage(text)
    else window.parent.postMessage(text, '*')
  })
}

// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
const state = {}
// USER_ACTIVITY is web-only — excluded so mobile isn't blocked waiting for it
// QUESTIONS is optional — activity may have none; we start once the rest arrive
const REQUIRED_CORE = ['API', 'USER', 'AUTH', 'ACTIVITY', 'ACTIVITY_RESPONSE', 'CONFIG']
const received = new Set()
let started = false
let hasQuit = false
let appContent = []   // {title, text, activityId, activityTitle}
let chatHistory = []  // [{role, content}]

// ─────────────────────────────────────────
// Message Handler
// ─────────────────────────────────────────
function onMessage(event) {
  try {
    const message = JSON.parse(event.data)
    if (!message || !message.key) return
    handleMessage(message)
  } catch (e) {}
}
document.addEventListener('message', onMessage)
window.addEventListener('message', onMessage)

function handleMessage(message) {
  switch (message.key) {
    case 'API':
    case 'AUTH':
    case 'TEMPLATE':
    case 'TEMPLATE_VARIATION':
    case 'USER':
    case 'ACTIVITY_RESPONSE':
    case 'CONFIG':
    case 'CONTENT':
      state[message.key] = message.data
      received.add(message.key)
      tryStart()
      break
    case 'USER_ACTIVITY':
      // Web-only — store it but don't require it for startup
      state.USER_ACTIVITY = message.data
      break
    case 'ACTIVITY':
      state.ACTIVITY = message.data
      received.add('ACTIVITY')
      tryStart()
      break
    case 'QUESTIONS':
      state.QUESTIONS = message.data || []
      received.add('QUESTIONS')
      tryStart()
      break
    case 'QUESTION':
      // Collect the first question too (mobile sends QUESTIONS first, then QUESTION)
      // Only use as fallback if QUESTIONS hasn't arrived yet
      if (!state.QUESTIONS && message.data) {
        state._firstQuestion = message.data
      }
      break
    case 'REQUEST_RESPONSE':
      const p = _pending[message.id]
      if (p) {
        delete _pending[message.id]
        message.error ? p.reject(new Error(message.error)) : p.resolve(message.data)
      }
      break
  }
}

function tryStart() {
  if (started) return
  // Start as soon as all core messages are received; QUESTIONS is a bonus
  const coreReady = REQUIRED_CORE.every(k => received.has(k))
  if (coreReady) {
    started = true
    startTemplate()
  }
}

const loadTime = Date.now()
// Hard fallback: if core messages never arrive (e.g. direct browser open), show error after 8s
setTimeout(() => {
  if (!started) {
    started = true
    // Try to start anyway with whatever we have
    startTemplate()
  }
}, 8000)

// Signal ready
postToApp('READY_DYNAMIC_MEDIA')

// ─────────────────────────────────────────
// Theme
// ─────────────────────────────────────────
async function applyTheme() {
  try {
    let appTheme = {}, platformTheme = {}
    const [app, settings] = await Promise.allSettled([
      restRequest('get', 'App', state.ACTIVITY_RESPONSE?.app),
      restRequest('list', 'Settings', {})
    ])
    if (app.status === 'fulfilled') appTheme = app.value?.theme || {}
    if (settings.status === 'fulfilled') platformTheme = settings.value?.items?.[0]?.theme || {}

    const theme = {
      colors: Object.assign({}, platformTheme.colors, appTheme.colors),
      font: appTheme.font || platformTheme.font,
      rounded: appTheme.rounded || platformTheme.rounded,
      generalBackground: appTheme.generalBackground || platformTheme.generalBackground,
    }

    const root = document.documentElement
    if (theme.colors?.primary)   root.style.setProperty('--color-primary',   theme.colors.primary)
    if (theme.colors?.secondary) root.style.setProperty('--color-secondary', theme.colors.secondary)
    if (theme.colors?.dark)      root.style.setProperty('--color-dark',      theme.colors.dark)
    if (theme.colors?.light)     root.style.setProperty('--color-light',     theme.colors.light)
    if (theme.generalBackground?.color) root.style.setProperty('--color-background', theme.generalBackground.color)
    const radiusMap = { NONE:'0px', SMALL:'4px', MEDIUM:'8px', LARGE:'16px', FULL:'9999px' }
    if (theme.rounded) root.style.setProperty('--border-radius', radiusMap[theme.rounded] || '12px')
  } catch(e) { /* use defaults */ }
}

// ─────────────────────────────────────────
// Build knowledge base from QUESTIONS + CONTENT
// ─────────────────────────────────────────
async function buildKnowledgeBase() {
  // Use QUESTIONS array if available; fall back to first question captured individually
  let questions = state.QUESTIONS
  if (!questions && state._firstQuestion) {
    questions = [state._firstQuestion]
  }
  questions = questions || []

  // Map questions to readable content chunks
  for (const q of questions) {
    if (!q.text) continue
    let chunk = {
      activityId: state.ACTIVITY?.id,
      activityTitle: state.ACTIVITY?.title || state.CONFIG?.activityTitle || 'this activity',
      questionId: q._id,
      title: q.label || q.text.slice(0, 60),
      text: q.text,
      type: q.type,
    }
    // Include option texts for MULTICHOICE / MULTISELECT
    if (q.options?.length) {
      chunk.options = q.options.map(o => o.text).filter(Boolean)
    }
    appContent.push(chunk)
  }

  // Additionally fetch user's recent activity responses for personalisation
  try {
    if (state.USER?.id && state.ACTIVITY?.id) {
      const result = await restRequest('list', 'ActivityResponse', {
        user: state.USER.id,
        activity: state.ACTIVITY.id,
        complete: true,
      })
      state.USER_HISTORY = result?.items || []
    }
  } catch(e) {}
}

// ─────────────────────────────────────────
// Start
// ─────────────────────────────────────────
async function startTemplate() {
  await applyTheme()
  await buildKnowledgeBase()

  // Personalise header
  const cfg = state.CONFIG || {}
  const botName = cfg.botName || 'App Assistant'
  document.getElementById('bot-name').textContent = botName

  // Show done button if configured as display-only
  const displayOnly = cfg.displayOnly === true || cfg.displayOnly === 'true'
  if (displayOnly) {
    document.getElementById('done-btn').style.display = 'block'
  }

  // Hide loading
  document.getElementById('loading').style.display = 'none'

  // Enable input
  const inputEl = document.getElementById('input')
  const sendBtn = document.getElementById('send-btn')
  inputEl.disabled = false
  sendBtn.disabled = false

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto'
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px'
    sendBtn.disabled = !inputEl.value.trim()
  })
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
  })

  // Welcome message
  const userName = state.USER?.displayName || state.USER?.username || 'there'
  const historyNote = state.USER_HISTORY?.length
    ? ` I can also see you've completed this activity ${state.USER_HISTORY.length} time(s) before.`
    : ''
  addBotMessage(
    `Hi ${userName}! 👋 I'm ${botName}. Ask me anything about this app's content — I'll always point you to the relevant activity.${historyNote}`,
    []
  )
}

// ─────────────────────────────────────────
// Chat UI helpers
// ─────────────────────────────────────────
function addBotMessage(text, refs = []) {
  const msgs = document.getElementById('messages')
  const wrap = document.createElement('div')
  wrap.className = 'msg bot'
  wrap.innerHTML = `<div class="icon">🤖</div><div><div class="bubble">${escapeHtml(text)}</div>${renderRefs(refs)}</div>`
  msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages')
  const wrap = document.createElement('div')
  wrap.className = 'msg user'
  wrap.innerHTML = `<div class="icon">👤</div><div class="bubble">${escapeHtml(text)}</div>`
  msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
}

function showTyping() {
  const msgs = document.getElementById('messages')
  const el = document.createElement('div')
  el.className = 'msg bot'
  el.id = 'typing'
  el.innerHTML = `<div class="icon">🤖</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`
  msgs.appendChild(el)
  msgs.scrollTop = msgs.scrollHeight
  document.getElementById('status-dot').className = 'thinking'
  document.getElementById('status-text').textContent = 'Thinking…'
}

function hideTyping() {
  document.getElementById('typing')?.remove()
  document.getElementById('status-dot').className = ''
  document.getElementById('status-text').textContent = 'Ready to help'
}

function renderRefs(refs) {
  if (!refs?.length) return ''
  const chips = refs.map(r =>
    `<span class="ref-chip" title="${escapeHtml(r.activityTitle)}">📍 ${escapeHtml(r.activityTitle)}</span>`
  ).join('')
  return `<div class="ref-chips">${chips}</div>`
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>')
}

// ─────────────────────────────────────────
// Send message
// ─────────────────────────────────────────
async function sendMessage() {
  const inputEl = document.getElementById('input')
  const sendBtn = document.getElementById('send-btn')
  const text = inputEl.value.trim()
  if (!text) return

  inputEl.value = ''
  inputEl.style.height = 'auto'
  sendBtn.disabled = true

  addUserMessage(text)
  chatHistory.push({ role: 'user', content: text })

  showTyping()

  try {
    const answer = await askClaude(text)
    hideTyping()
    addBotMessage(answer.text, answer.refs)
    chatHistory.push({ role: 'assistant', content: answer.text })
  } catch(e) {
    hideTyping()
    addBotMessage("Sorry, I encountered an error: " + (e.message || 'unknown error') + ". Please try again or contact your administrator.", [])
  }
  sendBtn.disabled = !inputEl.value.trim()
}

// ─────────────────────────────────────────
// Claude API call
// ─────────────────────────────────────────
async function askClaude(userQuestion) {
  const cfg = state.CONFIG || {}
  const botName = cfg.botName || 'App Assistant'
  const activityTitle = state.ACTIVITY?.title || cfg.activityTitle || 'this activity'
  const userName = state.USER?.displayName || state.USER?.username || 'the user'

  // Build knowledge context from app content
  const knowledgeBlocks = appContent.map((c, i) => {
    let block = `[Item ${i+1}] Activity: "${c.activityTitle}"\nQuestion: ${c.text}`
    if (c.options?.length) block += `\nOptions: ${c.options.join(' | ')}`
    return block
  }).join('\n\n')

  // User data context
  const userCtx = [
    state.USER?.displayName ? `Name: ${state.USER.displayName}` : '',
    state.USER?.email ? `Email: ${state.USER.email}` : '',
    state.USER?.xp != null ? `XP: ${state.USER.xp}` : '',
    state.USER?.coins != null ? `Coins: ${state.USER.coins}` : '',
    state.USER_HISTORY?.length ? `Completed this activity: ${state.USER_HISTORY.length} time(s)` : '',
  ].filter(Boolean).join('\n')

  const systemPrompt = `You are "${botName}", an in-app AI assistant for a Cogniss learning app.

CURRENT ACTIVITY: "${activityTitle}"
USER: ${userName}
USER DATA:
${userCtx || '(none available)'}

APP CONTENT (your knowledge base — answer ONLY from this):
${knowledgeBlocks || '(No content loaded yet)'}

RULES:
1. Answer ONLY based on the APP CONTENT above. Do not use external knowledge.
2. Every answer that references app content MUST cite the Activity name in your response, e.g. "According to the activity '${activityTitle}'…" or "This is covered in '${activityTitle}'."
3. If the question cannot be answered from the app content, respond EXACTLY with: "I'm sorry, I don't know the answer to that based on this app's content. Please refer to the relevant activity or contact your administrator."
4. If the user asks about their own data (score, progress, xp, coins, completions), answer using the USER DATA above.
5. Keep answers concise, friendly, and helpful.
6. Do NOT invent, guess, or hallucinate information not in the app content.
7. Format your JSON response as: {"answer": "...", "refs": [{"activityTitle": "..."}]}
   Include a refs array with the activity titles you referenced. Empty array if none.
   Return ONLY valid JSON — no markdown, no preamble.`

  const messages = [
    // Inject prior turns for context (last 8)
    ...chatHistory.slice(-8).map(m => ({ role: m.role, content: m.content })),
  ]
  // Replace last user message with current question (already pushed above)
  // chatHistory already has it, but messages was built from it, so just ensure
  // the last message is the current question
  if (messages[messages.length - 1]?.content !== userQuestion) {
    messages.push({ role: 'user', content: userQuestion })
  }

  // API key must be set in the activity's customConfig as "apiKey"
  const apiKey = cfg.apiKey || ''
  if (!apiKey) {
    return {
      text: "Configuration error: no Gemini API key found. Please ask your administrator to add the 'apiKey' field to this activity's custom config.",
      refs: [],
    }
  }

  // Build Gemini-format conversation history
  // Gemini uses {role: 'user'|'model', parts: [{text}]}
  const geminiHistory = chatHistory.slice(-8).map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }))

  // Ensure last turn is from user
  if (!geminiHistory.length || geminiHistory[geminiHistory.length - 1].role !== 'user') {
    geminiHistory.push({ role: 'user', parts: [{ text: userQuestion }] })
  }

  const geminiBody = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: geminiHistory,
    generationConfig: {
      maxOutputTokens: 1000,
      temperature: 0.2,
    }
  }

  const model = 'gemini-2.0-flash'
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`

  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(geminiBody)
  })

  if (!response.ok) {
    const errBody = await response.json().catch(() => ({}))
    const errMsg = errBody?.error?.message || 'HTTP ' + response.status
    throw new Error(errMsg)
  }
  const data = await response.json()

  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || ''
  let parsed
  try {
    const clean = raw.replace(/```json|```/g, '').trim()
    parsed = JSON.parse(clean)
  } catch(e) {
    parsed = { answer: raw, refs: [] }
  }

  return {
    text: parsed.answer || "I'm sorry, I don't know the answer to that based on this app's content.",
    refs: parsed.refs || [],
  }
}

// ─────────────────────────────────────────
// Finish (display-only mode)
// ─────────────────────────────────────────
function finish() {
  if (hasQuit) return
  hasQuit = true
  postToApp('QUIT', { completeState: 'COMPLETE' })
}
</script>
</body>
</html>
