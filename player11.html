<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Audio Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Light theme defaults — overridden at runtime from app theme */
      --bg:           #ffffff;
      --surface:      #f4f4f6;
      --surface-2:    #e8e8ed;
      --border:       #e0e0e8;
      --accent:       #6c5ce7;          /* overridden by app colors.primary */
      --accent-rgb:   108, 92, 231;     /* for rgba() use */
      --accent-light: #8a7df0;
      --text:         #0f0f14;
      --text-muted:   #6b6b80;
      --shadow:       rgba(0,0,0,0.08);
      --shadow-art:   rgba(0,0,0,0.14);
      --radius:       16px;
      --radius-sm:    10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* ── Shell ───────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── Header bar — grey extends full width to top of page ────────── */
    #header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 16px 14px;
      padding-top: 100px; /* absorbs the top safe-area spacing */
      flex-shrink: 0;
      background: #f0f0f3;
      border-bottom: 1px solid var(--border);
    }
    #header h1 {
      font-size: 16px; font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--text);
    }
    #close-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: #e2e2e7;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    #close-btn:hover  { background: var(--border); color: var(--text); }
    #close-btn:active { transform: scale(0.92); }

    /* ── Now-Playing Hero ────────────────────────────────────────────── */
    #now-playing {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 24px 16px;
    }

    #album-art {
      width: 180px; height: 180px;
      border-radius: var(--radius);
      object-fit: cover;
      background: var(--surface-2);
      box-shadow: 0 12px 40px var(--shadow-art);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.25s ease;
      flex-shrink: 0;
      opacity: 1;
    }
    #album-art.playing { transform: scale(1.05); }

    #album-art-placeholder {
      width: 180px; height: 180px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #album-art-placeholder svg { opacity: 0.3; }

    #track-info {
      margin-top: 16px;
      text-align: center;
      width: 100%;
      padding: 0 8px;
    }
    #track-title {
      font-size: 18px; font-weight: 700; line-height: 1.3;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #track-index { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Hidden SoundCloud iframe ────────────────────────────────────── */
    #sc-container { width: 100%; height: 0; overflow: hidden; }
    #sc-iframe { width: 100%; height: 166px; border: none; }

    /* ── Controls ────────────────────────────────────────────────────── */
    #controls {
      display: flex; align-items: center; justify-content: center;
      gap: 24px;
      margin-top: 18px;
      flex-shrink: 0;
      padding: 0 24px;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, transform 0.15s;
      border-radius: 50%; padding: 6px;
    }
    .ctrl-btn:hover  { color: var(--text); transform: scale(1.1); }
    .ctrl-btn:active { transform: scale(0.9); }

    #play-pause-btn {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(var(--accent-rgb), 0.35);
      transition: filter 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    #play-pause-btn:hover  { filter: brightness(1.1); transform: scale(1.05); }
    #play-pause-btn:active { transform: scale(0.95); }

    /* ── Progress bar ────────────────────────────────────────────────── */
    #progress-section {
      width: 100%; padding: 14px 24px 0; flex-shrink: 0;
    }
    #progress-track {
      position: relative; width: 100%; height: 4px;
      background: var(--surface-2); border-radius: 2px;
      cursor: pointer; margin: 10px 0;
    }
    #progress-track::before {
      content: ''; position: absolute; inset: -10px 0;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: var(--accent); border-radius: 2px;
      pointer-events: none;
    }
    #progress-thumb {
      position: absolute; top: 50%; left: 0%;
      transform: translate(-50%, -50%) scale(0);
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.2);
      pointer-events: none;
      transition: transform 0.15s;
    }
    #progress-track:hover #progress-thumb,
    #progress-track.scrubbing #progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }
    #progress-times {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text-muted);
      margin-top: 2px; user-select: none;
    }

    /* ── Divider ─────────────────────────────────────────────────────── */
    #playlist-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 20px 0;
      flex-shrink: 0;
    }

    /* ── Playlist — fills ALL remaining space, scrolls internally ────── */
    #playlist-section {
      flex: 1;
      min-height: 0;                      /* critical: allows flex child to shrink */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 16px 300px;          /* 300px bottom padding for safe area */
    }
    #playlist-section::-webkit-scrollbar { display: none; }

    #playlist-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px 10px;
    }

    #playlist { display: flex; flex-direction: column; gap: 6px; }

    .track-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s;
      border: 1.5px solid transparent;
    }
    .track-item:active { transform: scale(0.98); }
    .track-item.active {
      border-color: var(--accent);
      background: rgba(var(--accent-rgb), 0.07);
    }

    .track-thumb {
      width: 46px; height: 46px;
      border-radius: var(--radius-sm);
      object-fit: cover; flex-shrink: 0;
    }
    .track-thumb-ph {
      width: 46px; height: 46px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .track-meta { flex: 1; overflow: hidden; }
    .track-name {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .track-num { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .eq-bars {
      display: flex; align-items: flex-end;
      gap: 2px; height: 16px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.2s;
    }
    .track-item.active .eq-bars { opacity: 1; }
    .eq-bar {
      width: 3px; border-radius: 2px;
      background: var(--accent);
      animation: eq 0.6s ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    .eq-bar:nth-child(1) { animation-duration: 0.50s; }
    .eq-bar:nth-child(2) { animation-duration: 0.70s; }
    .eq-bar:nth-child(3) { animation-duration: 0.45s; }
    @keyframes eq { from { height: 4px; } to { height: 14px; } }
    .eq-bars.paused .eq-bar { animation-play-state: paused; height: 8px; }

    /* ── Loading / Error overlays ────────────────────────────────────── */
    #loading-screen, #error-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; background: var(--bg); z-index: 10;
    }
    #error-screen { display: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--surface-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-screen p, #error-screen p {
      color: var(--text-muted); font-size: 14px;
      text-align: center; max-width: 260px; line-height: 1.5;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Overlays -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Loading playlist…</p>
  </div>
  <div id="error-screen">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="13"/>
      <circle cx="12" cy="16.5" r="0.6" fill="var(--accent)"/>
    </svg>
    <p id="error-msg">No audio tracks found.</p>
  </div>

  <!-- Header -->
  <div id="header">
    <h1 id="activity-title">Audio Player</h1>
    <button id="close-btn" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="1" y1="1" x2="13" y2="13"/>
        <line x1="13" y1="1" x2="1" y2="13"/>
      </svg>
    </button>
  </div>

  <!-- Now Playing -->
  <div id="now-playing">
    <img id="album-art" style="display:none" alt="Album art" />
    <div id="album-art-placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3" fill="var(--text-muted)" stroke="none"/>
        <circle cx="12" cy="12" r="6.5" stroke-dasharray="2 3"/>
      </svg>
    </div>

    <div id="track-info">
      <div id="track-title">—</div>
      <div id="track-index"></div>
    </div>

    <!-- Hidden SoundCloud iframe -->
    <div id="sc-container">
      <iframe id="sc-iframe" allow="autoplay" src="about:blank"></iframe>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button class="ctrl-btn" id="prev-btn" aria-label="Previous">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button id="play-pause-btn" aria-label="Play / Pause">
        <svg id="icon-play"  width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="white" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button class="ctrl-btn" id="next-btn" aria-label="Next">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Progress bar -->
  <div id="progress-section">
    <div id="progress-track">
      <div id="progress-fill"></div>
      <div id="progress-thumb"></div>
    </div>
    <div id="progress-times">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <!-- Divider -->
  <div id="playlist-divider"></div>

  <!-- Playlist — flex:1, min-height:0, scrolls internally with 300px bottom padding -->
  <div id="playlist-section">
    <div id="playlist-label">Tracks</div>
    <div id="playlist"></div>
  </div>

</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  API: null, USER: null, TEMPLATE: null, TEMPLATE_VARIATION: null,
  AUTH: null, ACTIVITY: null, ACTIVITY_RESPONSE: null, CONFIG: {},
  QUESTIONS: null,
  _received: new Set(),
}

let tracks        = []
let currentIdx    = 0
let isPlaying     = false
let widget        = null
let widgetReady   = false
let progressInterval = null
let trackDuration = 0

// ─── REST_REQUEST helper ──────────────────────────────────────────────────────
let _reqCounter = 0
const _pending  = {}

function restRequest(method, model, data, timeoutMs = 4000) {
  return new Promise((resolve, reject) => {
    const id = 'req-' + (++_reqCounter)
    _pending[id] = { resolve, reject }
    const text = JSON.stringify({ key: 'REST_REQUEST', method, model, data, id, specialParams: null })
    if (isNative) window.ReactNativeWebView.postMessage(text)
    else          window.parent.postMessage(text, '*')
    // Hard timeout — if no response in timeoutMs, resolve with null so boot continues
    setTimeout(() => {
      if (_pending[id]) {
        delete _pending[id]
        resolve(null)
      }
    }, timeoutMs)
  })
}

// ─── postMessage bridge ───────────────────────────────────────────────────────
const isNative = typeof window.ReactNativeWebView !== 'undefined'

function postToApp(key, data = null) {
  const text = JSON.stringify({ key, data })
  if (isNative) window.ReactNativeWebView.postMessage(text)
  else          window.parent.postMessage(text, '*')
}

function onMessage(event) {
  try {
    const msg = JSON.parse(event.data)
    if (!msg || !msg.key) return
    handleMessage(msg)
  } catch (_) {}
}
document.addEventListener('message', onMessage)
window.addEventListener('message', onMessage)

// ─── Message handler ──────────────────────────────────────────────────────────
function handleMessage(msg) {
  const { key, data, id, error } = msg

  if (key === 'REQUEST_RESPONSE') {
    const p = _pending[id]
    if (p) { delete _pending[id]; error ? p.reject(new Error(error)) : p.resolve(data) }
    return
  }

  switch (key) {
    case 'API':                state.API                = data; break
    case 'USER':               state.USER               = data; break
    case 'TEMPLATE':           state.TEMPLATE           = data; break
    case 'TEMPLATE_VARIATION': state.TEMPLATE_VARIATION = data; break
    case 'AUTH':               state.AUTH               = data; break
    case 'ACTIVITY':           state.ACTIVITY           = data; break
    case 'ACTIVITY_RESPONSE':  state.ACTIVITY_RESPONSE  = data; break
    case 'USER_ACTIVITY':      break
    case 'CONFIG':             state.CONFIG             = data || {}; break
    case 'CONTENT':            break
    case 'QUESTION':
      // On mobile QUESTION arrives after QUESTIONS; on web before.
      // If we already have QUESTIONS, QUESTION arriving means we're fully initialised.
      if (state._received.has('QUESTIONS')) break
      // If QUESTION arrives and QUESTIONS never came, treat as no questions
      break
    case 'QUESTIONS':
      state.QUESTIONS = data || []
      state._received.add('QUESTIONS')
      break
    default: break
  }

  if (state._received.has('QUESTIONS')) maybeStart()
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
let started = false
function maybeStart() {
  if (started) return
  started = true
  boot()
}

function boot() {
  // Everything up to hideLoading is synchronous — no await, no network, cannot hang

  if (state.ACTIVITY?.name) {
    document.getElementById('activity-title').textContent = state.ACTIVITY.name
  }

  const raw = parseTracksFromQuestions(state.QUESTIONS)
  if (raw.length === 0) {
    showError('No audio tracks found. Make sure each TEXT_CONTENT question has a SoundCloud URL as its body text.')
    return
  }

  tracks = raw.map(t => ({ ...t }))
  buildPlaylist()
  loadTrack(0, false)
  hideLoading()   // spinner gone — player is live

  // Background jobs — fully detached, no await, no blocking
  setTimeout(() => { applyTheme() },             0)
  setTimeout(() => { resolveAndPatchArtwork() }, 0)
}

// ─── Theme — fetch app primary colour and apply as accent ─────────────────────
async function applyTheme() {
  try {
    let appColors = {}
    if (state.ACTIVITY_RESPONSE?.app) {
      const app = await restRequest('get', 'App', state.ACTIVITY_RESPONSE.app, 5000)
      appColors = app?.theme?.colors || {}
    }

    let platformColors = {}
    try {
      const settings = await restRequest('list', 'Settings', {}, 5000)
      platformColors = settings?.items?.[0]?.theme?.colors || {}
    } catch (_) {}

    const primary = appColors.primary || platformColors.primary || null
    if (primary) {
      const root = document.documentElement
      root.style.setProperty('--accent', primary)
      root.style.setProperty('--accent-light', lighten(primary, 0.15))
      const rgb = hexToRgb(primary)
      if (rgb) root.style.setProperty('--accent-rgb', `${rgb.r}, ${rgb.g}, ${rgb.b}`)
    }
  } catch (_) {
    // Non-critical — proceed with default colours
  }
}

// ─── Resolve artwork in background, patch each track as its URL arrives ───────
async function resolveAndPatchArtwork() {
  await Promise.all(tracks.map(async (t, idx) => {
    if (t.artUrl || !t.imageId) return
    try {
      const file = await restRequest('get', 'File', t.imageId, 6000)
      const url  = file?.url || null
      if (!url) return

      // Patch the track object
      tracks[idx] = { ...tracks[idx], artUrl: url }

      // Patch the hero art if this is the currently playing track
      if (idx === currentIdx) {
        const artEl = document.getElementById('album-art')
        const phEl  = document.getElementById('album-art-placeholder')
        artEl.style.opacity = '0'
        setTimeout(() => {
          artEl.src           = url
          artEl.style.display = 'block'
          phEl.style.display  = 'none'
          requestAnimationFrame(() => { artEl.style.opacity = '1' })
        }, 200)
      }

      // Patch the playlist thumbnail for this track
      const items = document.querySelectorAll('.track-item')
      const item  = items[idx]
      if (item) {
        const existing = item.querySelector('.track-thumb, .track-thumb-ph')
        if (existing) {
          const img     = document.createElement('img')
          img.src       = url
          img.className = 'track-thumb'
          img.alt       = ''
          img.onerror   = () => img.replaceWith(makePlaceholderThumb())
          existing.replaceWith(img)
        }
      }
    } catch (_) {
      // Image failed — placeholder stays
    }
  }))
}

function hexToRgb(hex) {
  const clean = hex.replace('#', '')
  const full  = clean.length === 3
    ? clean.split('').map(c => c + c).join('')
    : clean
  const n = parseInt(full, 16)
  if (isNaN(n)) return null
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 }
}

function lighten(hex, amount) {
  const rgb = hexToRgb(hex)
  if (!rgb) return hex
  const r = Math.min(255, Math.round(rgb.r + (255 - rgb.r) * amount))
  const g = Math.min(255, Math.round(rgb.g + (255 - rgb.g) * amount))
  const b = Math.min(255, Math.round(rgb.b + (255 - rgb.b) * amount))
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('')
}

// ─── Parse questions ──────────────────────────────────────────────────────────
// Each TEXT_CONTENT question = one track:
//   q.label      → track title
//   q.image      → File ID — resolved via restRequest('get', 'File', id)
//   q.imageMedia → {id, url} pre-resolved on mobile READY flow
//   q.text       → SoundCloud URL (body text)
//
function parseTracksFromQuestions(questions) {
  if (!questions?.length) return []
  const sorted = [...questions].sort((a, b) => (a.order ?? 0) - (b.order ?? 0))
  const result = []
  for (const q of sorted) {
    if (q.type !== 'TEXT_CONTENT') continue
    const rawText = (q.text || '').replace(/<[^>]+>/g, '').trim()
    if (!isSoundCloudUrl(rawText)) continue
    const title   = (q.label || '').trim() || `Track ${result.length + 1}`
    const artUrl  = q.imageMedia?.url || null
    const imageId = artUrl ? null : (q.image || null)
    result.push({ title, artUrl, imageId, scUrl: rawText })
  }
  return result
}

function isSoundCloudUrl(str) {
  return /soundcloud\.com\//i.test(str || '')
}

// ─── Playlist ─────────────────────────────────────────────────────────────────
function buildPlaylist() {
  const container = document.getElementById('playlist')
  container.innerHTML = ''
  tracks.forEach((track, idx) => {
    const item = document.createElement('div')
    item.className = 'track-item'

    if (track.artUrl) {
      const img     = document.createElement('img')
      img.src       = track.artUrl
      img.className = 'track-thumb'
      img.alt       = ''
      img.onerror   = () => img.replaceWith(makePlaceholderThumb())
      item.appendChild(img)
    } else {
      item.appendChild(makePlaceholderThumb())
    }

    const meta = document.createElement('div')
    meta.className = 'track-meta'
    meta.innerHTML = `<div class="track-name">${esc(track.title)}</div><div class="track-num">Track ${idx + 1}</div>`
    item.appendChild(meta)

    const eq = document.createElement('div')
    eq.className = 'eq-bars paused'
    eq.innerHTML = '<div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>'
    item.appendChild(eq)

    item.addEventListener('click', () => {
      if (idx === currentIdx) togglePlay()
      else loadTrack(idx, true)
    })
    container.appendChild(item)
  })
}

function makePlaceholderThumb() {
  const ph = document.createElement('div')
  ph.className = 'track-thumb-ph'
  ph.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5">
    <circle cx="12" cy="12" r="9"/>
    <circle cx="12" cy="12" r="3" fill="var(--text-muted)" stroke="none"/>
  </svg>`
  return ph
}

function updatePlaylistActive() {
  document.querySelectorAll('.track-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === currentIdx)
    const eq = el.querySelector('.eq-bars')
    if (eq) eq.classList.toggle('paused', !(isPlaying && idx === currentIdx))
  })
}

// ─── Track loading ────────────────────────────────────────────────────────────
// loadGeneration: incremented each time loadTrack is called.
// Every async callback checks it hasn't been superseded before touching the DOM.
let loadGeneration = 0

function loadTrack(idx, autoplay) {
  const gen = ++loadGeneration   // this load's generation token

  currentIdx = idx
  const track = tracks[idx]

  // ── Immediately unbind & discard the previous widget so its events stop firing
  destroyWidget()

  // ── Reset progress & UI state right away — don't wait for iframe
  isPlaying     = false          // will be corrected by PLAY event, not optimistically
  widgetReady   = false
  trackDuration = 0
  stopProgressPolling()
  setProgress(0)
  setTimeCurrent(0)
  setTimeTotal(0)
  updatePlayIcon()               // shows ▶ while loading
  updatePlaylistActive()

  // ── Album art — fade out, swap, fade in
  const artEl = document.getElementById('album-art')
  const phEl  = document.getElementById('album-art-placeholder')
  artEl.classList.remove('playing')
  artEl.style.opacity = '0'

  if (track.artUrl) {
    const tmp = new Image()
    tmp.onload = () => {
      if (gen !== loadGeneration) return   // stale — a newer track was loaded
      artEl.src           = track.artUrl
      artEl.style.display = 'block'
      phEl.style.display  = 'none'
      // Small rAF delay so the browser registers the opacity:0 before transitioning
      requestAnimationFrame(() => { artEl.style.opacity = '1' })
    }
    tmp.onerror = () => {
      if (gen !== loadGeneration) return
      artEl.style.display = 'none'
      phEl.style.display  = 'flex'
    }
    tmp.src = track.artUrl
  } else {
    artEl.style.display = 'none'
    phEl.style.display  = 'flex'
  }

  // ── Track info
  document.getElementById('track-title').textContent = track.title
  document.getElementById('track-index').textContent = `Track ${idx + 1} of ${tracks.length}`

  // ── Load the SoundCloud iframe
  const iframe = document.getElementById('sc-iframe')
  iframe.src = buildSCEmbedUrl(track.scUrl)

  // ── Bind the Widget API once the iframe fires its load event
  // Using iframe.onload is more reliable than a blind setTimeout
  iframe.onload = () => {
    if (gen !== loadGeneration) return   // stale
    bindWidget(gen, autoplay)
  }
}

function buildSCEmbedUrl(scUrl) {
  const enc       = encodeURIComponent(scUrl)
  const accentHex = getComputedStyle(document.documentElement)
    .getPropertyValue('--accent').trim().replace('#', '')
  // auto_play=false here — we call widget.play() manually after READY fires
  // so we control it precisely rather than relying on the embed param
  return `https://w.soundcloud.com/player/?url=${enc}&color=%23${accentHex || '6c5ce7'}&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false`
}

// ─── Widget lifecycle ─────────────────────────────────────────────────────────
function destroyWidget() {
  if (!widget) return
  try {
    // Unbind all events so they don't fire during or after track transition
    widget.unbind(SC.Widget.Events.READY)
    widget.unbind(SC.Widget.Events.PLAY)
    widget.unbind(SC.Widget.Events.PAUSE)
    widget.unbind(SC.Widget.Events.FINISH)
    widget.unbind(SC.Widget.Events.PLAY_PROGRESS)
    widget.pause()
  } catch (_) {}
  widget      = null
  widgetReady = false
}

function bindWidget(gen, autoplay) {
  try {
    widget = SC.Widget(document.getElementById('sc-iframe'))

    widget.bind(SC.Widget.Events.READY, () => {
      if (gen !== loadGeneration) return
      widgetReady = true

      // Fetch duration — retry up to 5× because SC sometimes returns 0 on READY
      fetchDuration(0)

      // Start playback if requested — triggered here, not via embed param
      if (autoplay) widget.play()
    })

    widget.bind(SC.Widget.Events.PLAY, () => {
      if (gen !== loadGeneration) return
      isPlaying = true
      updatePlayIcon(); updatePlaylistActive(); syncArtScale()
      startProgressPolling()
    })

    widget.bind(SC.Widget.Events.PAUSE, () => {
      if (gen !== loadGeneration) return
      isPlaying = false
      updatePlayIcon(); updatePlaylistActive(); syncArtScale()
      stopProgressPolling()
    })

    widget.bind(SC.Widget.Events.FINISH, () => {
      if (gen !== loadGeneration) return
      isPlaying = false
      updatePlayIcon(); updatePlaylistActive(); syncArtScale()
      stopProgressPolling()
      setProgress(1)
      // Auto-advance after a short pause
      if (currentIdx < tracks.length - 1) {
        setTimeout(() => { if (gen === loadGeneration) loadTrack(currentIdx + 1, true) }, 800)
      }
    })
  } catch (_) {}
}

// Retry getDuration until we get a non-zero value (max 5 attempts, 400ms apart)
function fetchDuration(attempt) {
  if (!widget || !widgetReady || attempt > 5) return
  widget.getDuration(d => {
    if (d && d > 0) {
      trackDuration = d
      setTimeTotal(d)
    } else {
      setTimeout(() => fetchDuration(attempt + 1), 400)
    }
  })
}

// ─── Progress — throttled with setInterval, not RAF+async ────────────────────
// RAF + async getPosition stacks up concurrent in-flight callbacks.
// A 250ms interval is imperceptible to users and avoids the stacking problem.
function startProgressPolling() {
  stopProgressPolling()
  progressInterval = setInterval(() => {
    if (!widget || !widgetReady || !isPlaying) return
    widget.getPosition(pos => {
      // Guard: if a new track loaded while we were waiting for the callback, ignore
      if (!isPlaying) return
      if (trackDuration > 0) setProgress(pos / trackDuration)
      setTimeCurrent(pos)
    })
  }, 250)
}

function stopProgressPolling() {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null }
}

function setProgress(ratio) {
  const pct = Math.min(Math.max(ratio * 100, 0), 100)
  document.getElementById('progress-fill').style.width = pct + '%'
  document.getElementById('progress-thumb').style.left = pct + '%'
}
function setTimeCurrent(ms) { document.getElementById('time-current').textContent = fmt(ms) }
function setTimeTotal(ms)   { document.getElementById('time-total').textContent   = fmt(ms) }
function fmt(ms) {
  const s = Math.floor((ms || 0) / 1000)
  return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`
}

// ─── Scrubber ─────────────────────────────────────────────────────────────────
;(function() {
  const track = document.getElementById('progress-track')
  let scrubbing = false
  function scrubTo(x) {
    const r = track.getBoundingClientRect()
    const ratio = Math.min(Math.max((x - r.left) / r.width, 0), 1)
    setProgress(ratio); setTimeCurrent(ratio * trackDuration)
    if (widget && widgetReady && trackDuration > 0) widget.seekTo(ratio * trackDuration)
  }
  track.addEventListener('touchstart',  e => { scrubbing = true;  track.classList.add('scrubbing');    scrubTo(e.touches[0].clientX) }, { passive: true })
  track.addEventListener('touchmove',   e => { if (scrubbing) scrubTo(e.touches[0].clientX) },         { passive: true })
  track.addEventListener('touchend',    () => { scrubbing = false; track.classList.remove('scrubbing') })
  track.addEventListener('mousedown',   e => { scrubbing = true;  track.classList.add('scrubbing');    scrubTo(e.clientX) })
  window.addEventListener('mousemove',  e => { if (scrubbing) scrubTo(e.clientX) })
  window.addEventListener('mouseup',    () => { if (scrubbing) { scrubbing = false; track.classList.remove('scrubbing') } })
})()

// ─── Helpers ──────────────────────────────────────────────────────────────────
function togglePlay() { if (!widget || !widgetReady) return; isPlaying ? widget.pause() : widget.play() }
function syncArtScale() { document.getElementById('album-art').classList.toggle('playing', isPlaying) }
function updatePlayIcon() {
  document.getElementById('icon-play').style.display  = isPlaying ? 'none'  : 'block'
  document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none'
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function hideLoading() {
  const s = document.getElementById('loading-screen')
  s.style.transition = 'opacity 0.3s'; s.style.opacity = '0'
  setTimeout(() => s.style.display = 'none', 300)
}
function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none'
  document.getElementById('error-msg').textContent = msg
  document.getElementById('error-screen').style.display = 'flex'
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('play-pause-btn').addEventListener('click', togglePlay)
document.getElementById('prev-btn').addEventListener('click', () => loadTrack(currentIdx > 0 ? currentIdx - 1 : tracks.length - 1, isPlaying))
document.getElementById('next-btn').addEventListener('click', () => loadTrack(currentIdx < tracks.length - 1 ? currentIdx + 1 : 0, isPlaying))
document.getElementById('close-btn').addEventListener('click', () => postToApp('QUIT', { completeState: 'COMPLETE' }))

// ─── Init ─────────────────────────────────────────────────────────────────────
postToApp('READY_DYNAMIC_MEDIA')

// Hard fallback: if QUESTIONS never arrives (e.g. empty topic), show error after 10s
setTimeout(() => {
  if (!started) {
    started = true
    showError('No audio tracks found. Make sure TEXT_CONTENT questions exist with SoundCloud URLs.')
  }
}, 10000)
</script>
</body>
</html>
