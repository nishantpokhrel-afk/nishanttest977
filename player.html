<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Audio Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f14;
      --surface:      #1a1a24;
      --surface-2:    #24243a;
      --accent:       #7c6aff;
      --accent-light: #a695ff;
      --text:         #f0f0f8;
      --text-muted:   #9090b0;
      --radius:       16px;
      --radius-sm:    8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* ── Shell ─────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      flex-shrink: 0;
      padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
    }

    #header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    #close-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    #close-btn:hover { background: var(--surface); color: var(--text); }

    /* ── Now-Playing Hero ────────────────────────────────────────── */
    #now-playing {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 24px 16px;
      /* ~300px breathing room for status bar / system UI */
      padding-top: 300px;
    }

    #album-art {
      width: 200px;
      height: 200px;
      border-radius: var(--radius);
      object-fit: cover;
      background: var(--surface-2);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      flex-shrink: 0;
    }
    #album-art.playing { transform: scale(1.04); }
    #album-art-placeholder {
      width: 200px;
      height: 200px;
      border-radius: var(--radius);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #album-art-placeholder svg { opacity: 0.3; }

    #track-info {
      margin-top: 20px;
      text-align: center;
      width: 100%;
    }
    #track-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    #track-index {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── SoundCloud Embed ─────────────────────────────────────────── */
    #sc-container {
      width: 100%;
      margin-top: 16px;
      /* hidden iframe — we only need the Widget API */
      height: 0;
      overflow: hidden;
    }
    #sc-iframe {
      width: 100%;
      height: 166px;
      border: none;
    }

    /* ── Playback Controls ────────────────────────────────────────── */
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-shrink: 0;
      padding: 0 24px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, transform 0.15s;
      border-radius: 50%;
      padding: 6px;
    }
    .ctrl-btn:hover { color: var(--text); transform: scale(1.1); }
    .ctrl-btn:active { transform: scale(0.95); }

    #play-pause-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(124,106,255,0.45);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    #play-pause-btn:hover { background: var(--accent-light); transform: scale(1.05); }
    #play-pause-btn:active { transform: scale(0.95); }

    /* ── Playlist ─────────────────────────────────────────────────── */
    #playlist-section {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 0;
      -webkit-overflow-scrolling: touch;
    }
    #playlist-section::-webkit-scrollbar { display: none; }

    #playlist-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px 10px;
    }

    #playlist {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.2s;
      border: 1.5px solid transparent;
    }
    .track-item:hover { background: var(--surface-2); }
    .track-item.active {
      border-color: var(--accent);
      background: rgba(124,106,255,0.12);
    }

    .track-thumb {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--surface-2);
      flex-shrink: 0;
    }
    .track-thumb-placeholder {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .track-meta { flex: 1; overflow: hidden; }
    .track-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .track-num { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .track-playing-icon {
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .track-item.active .track-playing-icon { opacity: 1; }

    /* ── Bottom Safe Area ─────────────────────────────────────────── */
    #bottom-spacer {
      height: calc(env(safe-area-inset-bottom, 16px) + 24px);
      flex-shrink: 0;
    }

    /* ── Loading / Error states ───────────────────────────────────── */
    #loading-screen, #error-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      z-index: 10;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--surface-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p, #error-screen p {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      max-width: 240px;
    }
    #error-screen { display: none; }

    /* ── Equaliser animation ──────────────────────────────────────── */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }
    .eq-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: eq 0.6s ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    .eq-bar:nth-child(1) { animation-duration: 0.5s; }
    .eq-bar:nth-child(2) { animation-duration: 0.7s; }
    .eq-bar:nth-child(3) { animation-duration: 0.45s; }
    @keyframes eq {
      from { height: 4px; }
      to   { height: 14px; }
    }
    .eq-bars.paused .eq-bar { animation-play-state: paused; }
  </style>
</head>
<body>

<div id="app">

  <!-- Loading overlay -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Loading playlist…</p>
  </div>

  <!-- Error overlay -->
  <div id="error-screen">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7c6aff" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="#7c6aff"/>
    </svg>
    <p id="error-msg">Something went wrong loading the playlist.</p>
  </div>

  <!-- Header -->
  <div id="header">
    <h1 id="activity-title">Music Player</h1>
    <button id="close-btn" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="1" y1="1" x2="13" y2="13"/>
        <line x1="13" y1="1" x2="1" y2="13"/>
      </svg>
    </button>
  </div>

  <!-- Now Playing -->
  <div id="now-playing">
    <img id="album-art" style="display:none" alt="Album art" />
    <div id="album-art-placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3" fill="#fff" stroke="none"/>
        <line x1="12" y1="2" x2="12" y2="5" stroke-width="1.8"/>
        <line x1="12" y1="19" x2="12" y2="22" stroke-width="1.8"/>
      </svg>
    </div>

    <div id="track-info">
      <div id="track-title">—</div>
      <div id="track-index"></div>
    </div>

    <!-- SoundCloud hidden iframe -->
    <div id="sc-container">
      <iframe id="sc-iframe"
        allow="autoplay"
        src="about:blank">
      </iframe>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button class="ctrl-btn" id="prev-btn" aria-label="Previous track">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>

      <button id="play-pause-btn" aria-label="Play / Pause">
        <!-- Play icon (default) -->
        <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="white">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <!-- Pause icon (hidden) -->
        <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="white" style="display:none">
          <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
        </svg>
      </button>

      <button class="ctrl-btn" id="next-btn" aria-label="Next track">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Playlist -->
  <div id="playlist-section">
    <div id="playlist-label">Up Next</div>
    <div id="playlist"></div>
  </div>

  <div id="bottom-spacer"></div>
</div>

<!-- SoundCloud Widget API -->
<script src="https://w.soundcloud.com/player/api.js"></script>

<script>
// ─── State ──────────────────────────────────────────────────────────────
const state = {
  API: null, USER: null, TEMPLATE: null, TEMPLATE_VARIATION: null,
  AUTH: null, ACTIVITY: null, ACTIVITY_RESPONSE: null, CONFIG: {},
  QUESTIONS: null,
  _received: new Set(),
}

// Tracks: { title, artUrl, scUrl }
let tracks     = []
let currentIdx = 0
let isPlaying  = false
let widget     = null
let widgetReady = false

// ─── postMessage bridge ─────────────────────────────────────────────────
const isNative = typeof window.ReactNativeWebView !== 'undefined'

function postToApp(key, data = null) {
  const text = JSON.stringify({ key, data })
  if (isNative) {
    window.ReactNativeWebView.postMessage(text)
  } else {
    window.parent.postMessage(text, '*')
  }
}

function onMessage(event) {
  try {
    const msg = JSON.parse(event.data)
    if (!msg || !msg.key) return
    handleMessage(msg)
  } catch (_) {}
}
document.addEventListener('message', onMessage)
window.addEventListener('message', onMessage)

// ─── Init message handler ───────────────────────────────────────────────
const REQUIRED = ['QUESTIONS']

function handleMessage(msg) {
  const { key, data } = msg

  switch (key) {
    case 'API':               state.API               = data; break
    case 'USER':              state.USER              = data; break
    case 'TEMPLATE':          state.TEMPLATE          = data; break
    case 'TEMPLATE_VARIATION':state.TEMPLATE_VARIATION= data; break
    case 'AUTH':              state.AUTH              = data; break
    case 'ACTIVITY':          state.ACTIVITY          = data; break
    case 'ACTIVITY_RESPONSE': state.ACTIVITY_RESPONSE = data; break
    case 'USER_ACTIVITY':     /* web-only, ignored */ break
    case 'CONFIG':            state.CONFIG            = data || {}; break
    case 'CONTENT':           /* unused */ break

    case 'QUESTIONS':
      state.QUESTIONS = data || []
      state._received.add('QUESTIONS')
      break

    case 'QUESTION':
      // We use QUESTIONS (all at once) — ignore the linear single
      break

    default: break
  }

  if (REQUIRED.every(k => state._received.has(k))) {
    startTemplate()
  }
}

// ─── Template start ─────────────────────────────────────────────────────
let started = false

function startTemplate() {
  if (started) return
  started = true

  if (state.ACTIVITY?.name) {
    document.getElementById('activity-title').textContent = state.ACTIVITY.name
  }

  tracks = parseTracksFromQuestions(state.QUESTIONS)

  if (tracks.length === 0) {
    showError('No audio tracks found. Make sure questions are set up with alternating Image and External Media content blocks.')
    return
  }

  buildPlaylist()
  loadTrack(0, false)
  hideLoading()
}

// ─── Parse alternating image / audio question pairs ─────────────────────
//
// Expected question order (sorted by `order` field, ascending):
//   Q1 (IMAGE_CONTENT)  → album art
//   Q2 (TEXT_CONTENT)   → track title in `text`, SoundCloud URL in first option text
//   Q3 (IMAGE_CONTENT)  → album art
//   Q4 (TEXT_CONTENT)   → track title + SoundCloud URL
//   …
//
// "External Media" in the Creator maps to a TEXT_CONTENT question whose
// `text` field is the track label and whose first option's `text` is the URL.
// The IMAGE_CONTENT question carries the album art via its `image` field (URL
// or media object) OR its `text` field may be a direct image URL.
//
function parseTracksFromQuestions(questions) {
  if (!questions || questions.length === 0) return []

  // Sort by the question's `order` field to respect creator ordering
  const sorted = [...questions].sort((a, b) => (a.order ?? 0) - (b.order ?? 0))
  const result = []

  let i = 0
  while (i < sorted.length) {
    const q = sorted[i]

    // ── IMAGE_CONTENT — grab art, then look ahead for the audio question ──
    if (q.type === 'IMAGE_CONTENT') {
      const artUrl = extractImageUrl(q)
      const next   = sorted[i + 1]
      if (next) {
        const { title, scUrl } = extractAudio(next)
        if (scUrl) {
          result.push({ title: title || `Track ${result.length + 1}`, artUrl, scUrl })
          i += 2
          continue
        }
      }
    }

    // ── TEXT_CONTENT / WEB question that contains a SoundCloud URL first ──
    const { title, scUrl } = extractAudio(q)
    if (scUrl) {
      result.push({ title: title || `Track ${result.length + 1}`, artUrl: null, scUrl })
    }

    i++
  }

  return result
}

function extractImageUrl(q) {
  // imageMedia (mobile preloaded)
  if (q.imageMedia?.url) return q.imageMedia.url
  // image field may be a URL string
  if (typeof q.image === 'string' && q.image.startsWith('http')) return q.image
  // text field may hold a direct URL
  if (typeof q.text === 'string' && q.text.startsWith('http')) return q.text.trim()
  return null
}

function extractAudio(q) {
  // title from question text
  const title = (q.text || '').replace(/<[^>]+>/g, '').trim()

  // SoundCloud URL: check options[0].text first, then question text
  let scUrl = null
  if (q.options && q.options.length > 0) {
    const optText = (q.options[0].text || '').trim()
    if (isSoundCloudUrl(optText)) scUrl = optText
  }
  if (!scUrl && isSoundCloudUrl(title)) {
    scUrl = title
  }

  return { title: scUrl === title ? '' : title, scUrl }
}

function isSoundCloudUrl(str) {
  return /soundcloud\.com\//i.test(str || '')
}

// ─── Playlist UI ─────────────────────────────────────────────────────────
function buildPlaylist() {
  const container = document.getElementById('playlist')
  container.innerHTML = ''

  tracks.forEach((track, idx) => {
    const item = document.createElement('div')
    item.className = 'track-item'
    item.dataset.idx = idx

    // Thumbnail
    if (track.artUrl) {
      const img = document.createElement('img')
      img.src = track.artUrl
      img.className = 'track-thumb'
      img.alt = ''
      img.onerror = () => { img.style.display = 'none' }
      item.appendChild(img)
    } else {
      const ph = document.createElement('div')
      ph.className = 'track-thumb-placeholder'
      ph.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9090b0" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="#9090b0" stroke="none"/></svg>`
      item.appendChild(ph)
    }

    const meta = document.createElement('div')
    meta.className = 'track-meta'
    meta.innerHTML = `<div class="track-name">${esc(track.title)}</div><div class="track-num">Track ${idx + 1}</div>`
    item.appendChild(meta)

    // Equaliser
    const eq = document.createElement('div')
    eq.className = 'eq-bars paused track-playing-icon'
    eq.innerHTML = `<div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>`
    item.appendChild(eq)

    item.addEventListener('click', () => {
      if (idx === currentIdx) {
        togglePlay()
      } else {
        loadTrack(idx, true)
      }
    })

    container.appendChild(item)
  })
}

function updatePlaylistActive() {
  document.querySelectorAll('.track-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === currentIdx)
    const eq = el.querySelector('.eq-bars')
    if (eq) eq.classList.toggle('paused', !isPlaying || idx !== currentIdx)
  })
}

// ─── Track loading ────────────────────────────────────────────────────────
function loadTrack(idx, autoplay) {
  currentIdx = idx
  const track = tracks[idx]

  // Hero art
  const artEl = document.getElementById('album-art')
  const phEl  = document.getElementById('album-art-placeholder')
  if (track.artUrl) {
    artEl.src = track.artUrl
    artEl.style.display = 'block'
    artEl.classList.remove('playing')
    phEl.style.display = 'none'
    artEl.onerror = () => {
      artEl.style.display = 'none'
      phEl.style.display = 'flex'
    }
  } else {
    artEl.style.display = 'none'
    phEl.style.display = 'flex'
  }

  document.getElementById('track-title').textContent  = track.title
  document.getElementById('track-index').textContent  = `Track ${idx + 1} of ${tracks.length}`

  // SoundCloud embed
  const embedUrl = buildSCEmbedUrl(track.scUrl, autoplay)
  const iframe   = document.getElementById('sc-iframe')
  iframe.src = embedUrl

  isPlaying = autoplay
  updatePlayIcon()
  updatePlaylistActive()
  widgetReady = false

  // Re-bind Widget API after src change
  setTimeout(bindWidget, 800)
}

function buildSCEmbedUrl(scUrl, autoplay) {
  const encoded = encodeURIComponent(scUrl)
  return `https://w.soundcloud.com/player/?url=${encoded}&color=%237c6aff&auto_play=${autoplay ? 'true' : 'false'}&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false`
}

// ─── SoundCloud Widget API ────────────────────────────────────────────────
function bindWidget() {
  try {
    widget = SC.Widget(document.getElementById('sc-iframe'))

    widget.bind(SC.Widget.Events.READY, () => {
      widgetReady = true
      if (isPlaying) widget.play()
      updateAlbumArtPlayState()
    })

    widget.bind(SC.Widget.Events.PLAY, () => {
      isPlaying = true
      updatePlayIcon()
      updatePlaylistActive()
      updateAlbumArtPlayState()
    })

    widget.bind(SC.Widget.Events.PAUSE, () => {
      isPlaying = false
      updatePlayIcon()
      updatePlaylistActive()
      updateAlbumArtPlayState()
    })

    widget.bind(SC.Widget.Events.FINISH, () => {
      isPlaying = false
      updatePlayIcon()
      updatePlaylistActive()
      updateAlbumArtPlayState()
      // Auto-advance
      if (currentIdx < tracks.length - 1) {
        setTimeout(() => loadTrack(currentIdx + 1, true), 600)
      }
    })
  } catch (e) {
    // Widget API unavailable (e.g. ad-blocked) — fall through gracefully
  }
}

function togglePlay() {
  if (!widget || !widgetReady) return
  if (isPlaying) {
    widget.pause()
  } else {
    widget.play()
  }
}

function updatePlayIcon() {
  document.getElementById('icon-play').style.display  = isPlaying ? 'none'  : 'block'
  document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none'
}

function updateAlbumArtPlayState() {
  const art = document.getElementById('album-art')
  if (isPlaying) {
    art.classList.add('playing')
  } else {
    art.classList.remove('playing')
  }
}

// ─── Controls ─────────────────────────────────────────────────────────────
document.getElementById('play-pause-btn').addEventListener('click', togglePlay)

document.getElementById('prev-btn').addEventListener('click', () => {
  const newIdx = currentIdx > 0 ? currentIdx - 1 : tracks.length - 1
  loadTrack(newIdx, isPlaying)
})

document.getElementById('next-btn').addEventListener('click', () => {
  const newIdx = currentIdx < tracks.length - 1 ? currentIdx + 1 : 0
  loadTrack(newIdx, isPlaying)
})

document.getElementById('close-btn').addEventListener('click', () => {
  postToApp('QUIT', { completeState: 'COMPLETE' })
})

// ─── Helpers ───────────────────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function hideLoading() {
  const s = document.getElementById('loading-screen')
  s.style.opacity = '0'
  s.style.transition = 'opacity 0.3s'
  setTimeout(() => s.style.display = 'none', 300)
}

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none'
  const err = document.getElementById('error-screen')
  document.getElementById('error-msg').textContent = msg
  err.style.display = 'flex'
}

// ─── Boot ──────────────────────────────────────────────────────────────────
postToApp('READY_DYNAMIC_MEDIA')
</script>
</body>
