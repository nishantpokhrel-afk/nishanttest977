<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book Appointment</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
<script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
<style>
  :root {
    --ink: #1a1a2e;
    --ink-soft: #4a4a6a;
    --ink-faint: #9898b8;
    --cream: #f8f6f1;
    --white: #ffffff;
    --accent: #5b4fcf;
    --accent-light: #ede9ff;
    --accent-dark: #3d35a0;
    --success: #2ecc8a;
    --success-light: #e6faf3;
    --error: #e05252;
    --error-light: #fdeaea;
    --border: rgba(26,26,46,0.12);
    --shadow: 0 4px 24px rgba(91,79,207,0.10);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; top: -120px; right: -120px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(91,79,207,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .app { max-width: 480px; margin: 0 auto; padding: 24px 20px 40px; position: relative; z-index: 1; }

  /* Header */
  .header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.5s ease both; }
  .header-icon {
    width: 56px; height: 56px; background: var(--accent); border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; box-shadow: var(--shadow);
  }
  .header-icon svg { width: 28px; height: 28px; fill: white; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--ink); letter-spacing: -0.5px; }
  .header p { margin-top: 6px; font-size: 14px; color: var(--ink-soft); font-weight: 300; }

  /* Tabs */
  .tab-nav { display: flex; gap: 4px; background: var(--white); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; background: none; color: var(--ink-soft); }
  .tab-btn.active { background: var(--accent); color: white; }

  /* Cards */
  .card { background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; animation: fadeUp 0.4s ease both; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-faint); margin-bottom: 16px; }

  /* Event list */
  .event-list { display: flex; flex-direction: column; gap: 10px; }
  .event-item { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 16px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 14px; background: var(--cream); }
  .event-item:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-1px); box-shadow: var(--shadow); }
  .event-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; background: var(--accent); }
  .event-info { flex: 1; }
  .event-name { font-weight: 600; font-size: 15px; color: var(--ink); }
  .event-meta { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .event-arrow { color: var(--ink-faint); font-size: 20px; }

  /* Calendly widget */
  #calendly-container { display: none; animation: fadeUp 0.4s ease both; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--ink-soft); cursor: pointer; margin-bottom: 16px; transition: color 0.15s; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 0; }
  .back-link:hover { color: var(--accent); }
  .calendly-inline-widget { border-radius: var(--radius) !important; overflow: hidden; box-shadow: var(--shadow); min-width: 280px; height: 700px; }

  /* Confirmation */
  #booking-confirmed { display: none; animation: fadeUp 0.4s ease both; }
  .confirm-hero { text-align: center; padding: 20px 0 24px; }
  .confirm-check { width: 72px; height: 72px; border-radius: 50%; background: var(--success-light); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; animation: pop 0.4s ease both; }
  .confirm-check svg { width: 36px; height: 36px; }
  .confirm-hero h2 { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--ink); }
  .confirm-hero p { font-size: 14px; color: var(--ink-soft); margin-top: 6px; }
  .detail-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .detail-row:last-child { border-bottom: none; }
  .detail-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .detail-label { font-size: 11px; color: var(--ink-faint); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-value { font-size: 15px; color: var(--ink); font-weight: 500; margin-top: 2px; }

  /* Appointments */
  #tab-appointments { display: none; }
  .appt-item { border-radius: var(--radius-sm); padding: 16px; border: 1.5px solid var(--border); background: var(--cream); margin-bottom: 10px; }
  .appt-item.upcoming { border-color: var(--accent); background: var(--accent-light); }
  .appt-badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 3px 8px; border-radius: 20px; margin-bottom: 8px; }
  .appt-badge.upcoming { background: var(--accent); color: white; }
  .appt-badge.past { background: var(--border); color: var(--ink-faint); }
  .appt-badge.cancelled { background: var(--error-light); color: var(--error); }
  .appt-name { font-weight: 600; font-size: 15px; color: var(--ink); }
  .appt-time { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }

  /* Buttons */
  .btn { width: 100%; padding: 15px; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 16px rgba(91,79,207,0.3); margin-top: 12px; }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--cream); color: var(--ink); border: 1.5px solid var(--border); margin-top: 10px; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }
  #screen-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--accent-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 14px; color: var(--ink-soft); }
  .notice { border-radius: var(--radius-sm); padding: 14px 16px; font-size: 14px; margin-bottom: 16px; }
  .notice.error { background: var(--error-light); color: var(--error); }
  .empty-state { text-align: center; padding: 32px 20px; color: var(--ink-faint); }
  .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div class="app">

  <!-- LOADING -->
  <div id="screen-loading" class="screen active">
    <div class="spinner"></div>
    <p class="loading-text">Loading…</p>
  </div>

  <!-- FATAL ERROR -->
  <div id="screen-error" class="screen">
    <div class="header">
      <div class="header-icon" style="background:var(--error)">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      </div>
      <h1>Setup Error</h1>
      <p id="error-msg">Could not load template.</p>
    </div>
  </div>

  <!-- MAIN -->
  <div id="screen-main" class="screen">
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zM7 11h5v5H7z"/></svg>
      </div>
      <h1 id="app-title">Book an Appointment</h1>
      <p id="app-subtitle">Select a time that works for you</p>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('book')">📅 Book</button>
      <button class="tab-btn" onclick="switchTab('appointments')">📋 My Appointments</button>
    </div>

    <!-- BOOK TAB -->
    <div id="tab-book">

      <!-- Step 1: pick event type -->
      <div id="event-picker">
        <div class="card">
          <div class="card-title">Choose appointment type</div>
          <div class="event-list" id="event-list">
            <div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>
          </div>
        </div>
      </div>

      <!-- Step 2: Calendly inline widget -->
      <div id="calendly-container">
        <button class="back-link" onclick="backToEvents()">← Back to appointment types</button>
        <div id="calendly-widget"></div>
      </div>

      <!-- Step 3: Confirmed -->
      <div id="booking-confirmed">
        <div class="card">
          <div class="confirm-hero">
            <div class="confirm-check">
              <svg viewBox="0 0 24 24" fill="none" stroke="#2ecc8a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <h2>You're booked!</h2>
            <p>A confirmation has been sent to your email.</p>
          </div>
          <div id="confirm-details"></div>
        </div>
        <button class="btn btn-secondary" onclick="resetBooking()">Book another appointment</button>
        <button class="btn btn-primary" onclick="finishActivity()">Done</button>
      </div>

    </div>

    <!-- APPOINTMENTS TAB -->
    <div id="tab-appointments">
      <div class="card">
        <div class="card-title">Upcoming</div>
        <div id="appt-upcoming"><div class="spinner" style="margin:0 auto"></div></div>
      </div>
      <div class="card">
        <div class="card-title">Past</div>
        <div id="appt-past"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════
//  COGNISS BRIDGE
// ═══════════════════════════════════════
const appState = { CONFIG:{}, USER:{}, ACTIVITY:{}, QUESTIONS:[], received: new Set() }
const REQUIRED = ['CONFIG','USER','ACTIVITY','QUESTIONS']
let appReady = false

const isNative = typeof window.ReactNativeWebView !== 'undefined'
function postToApp(key, data=null) {
  const t = JSON.stringify({key,data})
  if (isNative) window.ReactNativeWebView.postMessage(t)
  else window.parent.postMessage(t,'*')
}

function handleMsg(msg) {
  const {key,data} = msg
  if (key==='CONFIG')    { appState.CONFIG=data||{};                                mark('CONFIG') }
  if (key==='USER')      { appState.USER=data||{};                                  mark('USER') }
  if (key==='ACTIVITY')  { appState.ACTIVITY=data||{};                              mark('ACTIVITY') }
  if (key==='QUESTIONS') { appState.QUESTIONS=Array.isArray(data)?data:[];          mark('QUESTIONS') }
  if (key==='QUESTION' && !appState.received.has('QUESTIONS')) {
    appState.QUESTIONS=data?[data]:[]; mark('QUESTIONS')
  }
}
function mark(k) {
  appState.received.add(k)
  if (!appReady && REQUIRED.every(r=>appState.received.has(r))) { appReady=true; initApp() }
}
function onMsg(e) { try { const m=JSON.parse(e.data); if(m&&m.key) handleMsg(m) } catch(_){} }
document.addEventListener('message', onMsg)
window.addEventListener('message', onMsg)
postToApp('READY_DYNAMIC_MEDIA')

// ═══════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════
const CAPI = 'https://api.calendly.com'
let token=null, orgUri=null, selectedEvent=null

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
async function initApp() {
  token = appState.CONFIG.calendlyToken || appState.CONFIG.token || null
  if (!token) { fatalError('No Calendly API token. Add "calendlyToken" to the activity custom config JSON.'); return }

  document.getElementById('app-title').textContent    = appState.CONFIG.title    || 'Book an Appointment'
  document.getElementById('app-subtitle').textContent = appState.CONFIG.subtitle || 'Select a time that works for you'

  try {
    const me = await cFetch('/users/me')
    orgUri   = me.resource.current_organization
    showScreen('screen-main')
    loadEventTypes()
  } catch(e) {
    fatalError('Could not connect to Calendly. Check your API token is valid. (' + e.message + ')')
  }

  // Calendly fires this when a booking is completed inside its widget
  window.addEventListener('message', function(e) {
    try {
      const d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data
      if (d && d.event === 'calendly.event_scheduled') onCalendlyBooked(d.payload)
    } catch(_){}
  })
}

// ═══════════════════════════════════════
//  CALENDLY API HELPER
// ═══════════════════════════════════════
async function cFetch(path, opts={}) {
  const res = await fetch(CAPI+path, {
    ...opts,
    headers: { 'Authorization':'Bearer '+token, 'Content-Type':'application/json', ...(opts.headers||{}) }
  })
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.message||'HTTP '+res.status) }
  return res.json()
}

// ═══════════════════════════════════════
//  EVENT TYPES
// ═══════════════════════════════════════
async function loadEventTypes() {
  const list = document.getElementById('event-list')
  list.innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>'
  try {
    const data  = await cFetch('/event_types?organization='+encodeURIComponent(orgUri)+'&active=true')
    const types = data.collection || []
    if (!types.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No active event types found.</p></div>'
      return
    }
    list.innerHTML = types.map((et,i) => `
      <div class="event-item" style="animation-delay:${i*0.06}s"
           onclick='openWidget(${JSON.stringify(JSON.stringify(et))})'>
        <div class="event-dot" style="background:${et.color||'var(--accent)'}"></div>
        <div class="event-info">
          <div class="event-name">${et.name}</div>
          <div class="event-meta">${et.duration} min${et.description_plain?' · '+et.description_plain.slice(0,55)+(et.description_plain.length>55?'…':''):''}</div>
        </div>
        <div class="event-arrow">›</div>
      </div>`).join('')
  } catch(e) {
    list.innerHTML = '<div class="notice error">⚠️ '+e.message+'</div>'
  }
}

// ═══════════════════════════════════════
//  CALENDLY INLINE WIDGET
// ═══════════════════════════════════════
function openWidget(etJson) {
  selectedEvent = JSON.parse(etJson)

  document.getElementById('event-picker').style.display     = 'none'
  document.getElementById('calendly-container').style.display = 'block'
  document.getElementById('booking-confirmed').style.display  = 'none'

  const widgetEl = document.getElementById('calendly-widget')
  widgetEl.innerHTML = ''

  const prefill = {
    name:  appState.USER.displayName || '',
    email: appState.USER.email       || ''
  }

  function tryInit() {
    if (window.Calendly) {
      window.Calendly.initInlineWidget({
        url:           selectedEvent.scheduling_url,
        parentElement: widgetEl,
        prefill,
        utm: {}
      })
    } else {
      setTimeout(tryInit, 300)
    }
  }
  tryInit()
}

function backToEvents() {
  document.getElementById('event-picker').style.display      = 'block'
  document.getElementById('calendly-container').style.display = 'none'
  document.getElementById('booking-confirmed').style.display  = 'none'
  document.getElementById('calendly-widget').innerHTML = ''
  selectedEvent = null
}

// ═══════════════════════════════════════
//  BOOKING CONFIRMED
// ═══════════════════════════════════════
function onCalendlyBooked(payload) {
  const booking = {
    eventTypeName: selectedEvent ? selectedEvent.name : 'Appointment',
    eventUri:      payload?.event?.uri   || null,
    inviteeUri:    payload?.invitee?.uri || null,
    bookedAt:      new Date().toISOString()
  }

  // Save to Cogniss if a question exists
  if (appState.QUESTIONS.length > 0) {
    postToApp('QUESTION_RESPONSE', { index:0, textValue: JSON.stringify(booking), duration:0 })
  }

  document.getElementById('calendly-container').style.display = 'none'
  document.getElementById('booking-confirmed').style.display  = 'block'

  document.getElementById('confirm-details').innerHTML = `
    <div class="detail-row">
      <div class="detail-icon">📋</div>
      <div><div class="detail-label">Appointment</div><div class="detail-value">${booking.eventTypeName}</div></div>
    </div>
    <div class="detail-row">
      <div class="detail-icon">👤</div>
      <div><div class="detail-label">Name</div><div class="detail-value">${appState.USER.displayName||'—'}</div></div>
    </div>
    <div class="detail-row">
      <div class="detail-icon">✉️</div>
      <div><div class="detail-label">Email</div><div class="detail-value">${appState.USER.email||'—'}</div></div>
    </div>
    <div class="detail-row">
      <div class="detail-icon">✅</div>
      <div><div class="detail-label">Status</div><div class="detail-value" style="color:var(--success)">Confirmed</div></div>
    </div>
  `
}

// ═══════════════════════════════════════
//  MY APPOINTMENTS
// ═══════════════════════════════════════
async function loadAppointments() {
  const upEl = document.getElementById('appt-upcoming')
  const paEl = document.getElementById('appt-past')
  upEl.innerHTML = '<div class="spinner" style="margin:0 auto"></div>'
  paEl.innerHTML = ''
  try {
    const data = await cFetch('/scheduled_events?organization='+encodeURIComponent(orgUri)+'&count=50&sort=start_time:desc')
    const all  = data.collection || []
    const now  = new Date()
    const upcoming = all.filter(e => new Date(e.start_time) >= now && e.status==='active')
    const past     = all.filter(e => new Date(e.start_time) <  now || e.status!=='active')
    upEl.innerHTML = upcoming.length ? upcoming.map(renderAppt).join('') : '<div class="empty-state"><div class="empty-icon">📅</div><p>No upcoming appointments</p></div>'
    paEl.innerHTML = past.length    ? past.slice(0,5).map(renderAppt).join('') : '<div class="empty-state"><div class="empty-icon">🕰️</div><p>No past appointments</p></div>'
  } catch(e) {
    upEl.innerHTML = '<div class="notice error">⚠️ '+e.message+'</div>'
  }
}

function renderAppt(ev) {
  const dt      = new Date(ev.start_time)
  const dateStr = dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})
  const timeStr = dt.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})
  const isCancelled = ev.status==='canceled'
  const isPast      = dt < new Date()
  const cls         = isCancelled?'cancelled':isPast?'past':'upcoming'
  const lbl         = isCancelled?'Cancelled':isPast?'Completed':'Upcoming'
  return `<div class="appt-item ${cls}"><span class="appt-badge ${cls}">${lbl}</span><div class="appt-name">${ev.name||'Appointment'}</div><div class="appt-time">📅 ${dateStr} &nbsp;⏰ ${timeStr}</div></div>`
}

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tab-book').style.display         = tab==='book'         ? 'block':'none'
  document.getElementById('tab-appointments').style.display = tab==='appointments' ? 'block':'none'
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&tab==='book')||(i===1&&tab==='appointments'))
  })
  if (tab==='appointments') loadAppointments()
}

function resetBooking() {
  selectedEvent=null
  document.getElementById('booking-confirmed').style.display  = 'none'
  document.getElementById('calendly-widget').innerHTML         = ''
  document.getElementById('event-picker').style.display       = 'block'
  loadEventTypes()
}

function finishActivity() { postToApp('QUIT',{completeState:'COMPLETE'}) }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>{ s.classList.remove('active'); s.style.display='' })
  const el=document.getElementById(id); el.classList.add('active'); el.style.display='block'
}

function fatalError(msg) { document.getElementById('error-msg').textContent=msg; showScreen('screen-error') }

// ═══════════════════════════════════════
//  DEV FALLBACK
// ═══════════════════════════════════════
setTimeout(()=>{
  if (!appReady) {
    const t = new URLSearchParams(location.search).get('token')
    if (t) {
      appState.CONFIG={calendlyToken:t}; appState.USER={displayName:'Test User',email:'test@example.com'}
      appState.ACTIVITY={id:'dev'}; appState.QUESTIONS=[]; appReady=true; initApp()
    } else {
      fatalError('No config received. For testing, add ?token=YOUR_CALENDLY_TOKEN to the URL.')
    }
  }
},3000)
</script>
</body>
</html>
