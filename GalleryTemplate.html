<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Onboarding Template</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f2f2;
      --surface: #ffffff;
      --card-bg: #e8e8e8;
      --accent: #4A90D9;
      --accent-light: #cce0f5;
      --text-primary: #1a1a1a;
      --text-secondary: #555;
      --text-on-accent: #ffffff;
      --option-bg: #e0e0e0;
      --option-selected: #4A90D9;
      --option-selected-text: #ffffff;
      --option-border: #b0b0b0;
      --radius-card: 16px;
      --radius-btn: 999px;
      --overlay-bg: rgba(80, 80, 80, 0.35);
      --continue-bg: #e0e0e0;
      --continue-text: #333;
      --continue-active-bg: #4A90D9;
      --continue-active-text: #ffffff;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-primary);
    }

    /* ── Shell ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    /* ── Loading ── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      z-index: 100;
      flex-direction: column;
      gap: 12px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--accent-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Header ── */
    #header {
      flex: 0 0 auto;
      padding: 14px 16px 8px;
    }

    /* Progress dots */
    #progress-dots {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 0;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--card-bg);
      flex-shrink: 0;
      transition: background 0.25s, transform 0.25s;
    }
    .dot.active {
      background: var(--accent);
      transform: scale(1.2);
    }
    .dot.done {
      background: var(--accent-light);
    }
    #back-btn {
      margin-left: auto;
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--text-secondary);
      padding: 2px 6px;
      border-radius: 8px;
      line-height: 1;
    }
    #back-btn:hover { background: var(--card-bg); }

    /* Activity label */
    #activity-label {
      font-size: 22px;
      font-weight: 700;
      padding: 10px 16px 4px;
      flex: 0 0 auto;
    }

    /* ── Scrollable content area ── */
    #content-area {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 0 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── IMAGE_CONTENT block ── */
    .image-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .image-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-top: 4px;
    }

    .image-thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: var(--radius-card);
      background: var(--card-bg);
      overflow: hidden;
      position: relative;
    }
    .image-thumbnail img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .image-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-placeholder svg { opacity: 0.4; }

    /* Full-bleed background card with text overlay */
    .image-bg-card {
      width: 100%;
      border-radius: var(--radius-card);
      background: var(--card-bg);
      overflow: hidden;
      position: relative;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
    }
    .image-bg-card img.bg-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .image-bg-overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay-bg);
    }
    .image-bg-text {
      position: relative;
      z-index: 1;
      color: #fff;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      padding: 24px 20px;
      line-height: 1.4;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    /* ── MULTICHOICE / MULTISELECT block ── */
    .choice-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-face-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--surface);
      border: 1.5px solid var(--option-border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 2px;
    }

    .option-btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--radius-btn);
      border: 2px solid var(--option-border);
      background: var(--option-bg);
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .option-btn:active { transform: scale(0.97); }
    .option-btn.selected {
      background: var(--option-selected);
      border-color: var(--option-selected);
      color: var(--option-selected-text);
    }
    /* multiselect has a checkmark */
    .option-btn.multiselect {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      border-radius: 14px;
    }
    .option-btn.multiselect .check-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--option-border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .option-btn.multiselect.selected .check-icon {
      background: var(--option-selected-text);
      border-color: var(--option-selected-text);
    }
    .option-btn.multiselect.selected .check-icon::after {
      content: '';
      width: 6px; height: 10px;
      border-right: 2px solid var(--option-selected);
      border-bottom: 2px solid var(--option-selected);
      transform: rotate(45deg) translate(-1px, -1px);
      display: block;
    }
    .option-btn.multiselect .option-text { flex: 1; }

    /* ── Feedback banner ── */
    #feedback-banner {
      flex: 0 0 auto;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      min-height: 36px;
      transition: opacity 0.2s;
      color: var(--text-secondary);
    }

    /* ── Footer ── */
    #footer {
      flex: 0 0 auto;
      padding: 8px 16px 20px;
    }
    #continue-btn {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius-btn);
      border: none;
      background: var(--continue-bg);
      color: var(--continue-text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    #continue-btn.active {
      background: var(--continue-active-bg);
      color: var(--continue-active-text);
    }
    #continue-btn:active { transform: scale(0.97); }

    /* ── Error state ── */
    #error-view {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      gap: 12px;
      background: var(--surface);
      z-index: 99;
    }
    #error-view p { color: var(--text-secondary); font-size: 14px; }

    /* ── Transitions ── */
    .slide-in {
      animation: slideIn 0.28s ease forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading…</span>
  </div>

  <!-- Error -->
  <div id="error-view">
    <p id="error-msg">Something went wrong. Please try again.</p>
  </div>

  <!-- Header -->
  <div id="header">
    <div id="progress-dots" style="display:flex"></div>
  </div>

  <div id="activity-label"></div>

  <!-- Main content -->
  <div id="content-area"></div>

  <!-- Feedback -->
  <div id="feedback-banner"></div>

  <!-- Footer -->
  <div id="footer">
    <button id="continue-btn">Continue</button>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  Bridge
// ─────────────────────────────────────────────
const isNative = typeof window.ReactNativeWebView !== 'undefined'

function postToApp(key, data = null) {
  const text = JSON.stringify({ key, data })
  if (isNative) window.ReactNativeWebView.postMessage(text)
  else window.parent.postMessage(text, '*')
}

function onMessage(event) {
  try {
    const msg = JSON.parse(event.data)
    if (!msg || !msg.key) return
    handleMessage(msg)
  } catch (_) {}
}
document.addEventListener('message', onMessage)
window.addEventListener('message', onMessage)

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
const state = {
  ready: false,
  questions: null,   // full array from QUESTIONS
  activity: null,
  config: {},
  apiBase: null,
  auth: null,
  // runtime
  currentIndex: 0,
  // per-question selections
  // Map<questionId, { type, selected: Set<optionId> }>
  selections: new Map(),
  // media cache: Map<mediaId, objectURL | null>
  mediaCache: new Map(),
}

// required init keys before we render
const REQUIRED_INIT = new Set(['QUESTIONS', 'ACTIVITY', 'CONFIG'])
const received = new Set()

function handleMessage(msg) {
  switch (msg.key) {

    case 'API':       state.apiBase = msg.data; break
    case 'AUTH':      state.auth    = msg.data; break
    case 'ACTIVITY':  state.activity = msg.data; received.add('ACTIVITY'); checkReady(); break
    case 'CONFIG':    state.config   = msg.data || {}; received.add('CONFIG'); checkReady(); break

    case 'QUESTIONS':
      state.questions = (msg.data || []).filter(q =>
        ['IMAGE_CONTENT', 'MULTICHOICE', 'MULTISELECT'].includes(q.type)
      )
      received.add('QUESTIONS')
      checkReady()
      break

    // QUESTION (linear) — we ignore in favour of the full QUESTIONS array
    case 'QUESTION': break

    // Result of a submitted answer
    case 'QUESTION_RESPONSE':
      handleAnswerResult(msg.data)
      break

    // REST_REQUEST result for media fetch
    case 'REQUEST_RESPONSE':
      handleMediaResponse(msg)
      break
  }
}

function checkReady() {
  if (state.ready) return
  if (!REQUIRED_INIT.isSubsetOf
      ? [...REQUIRED_INIT].every(k => received.has(k))
      : received.has('QUESTIONS') && received.has('ACTIVITY') && received.has('CONFIG')) {
    state.ready = true
    init()
  }
}

// ─────────────────────────────────────────────
//  Media
// ─────────────────────────────────────────────
const pendingMediaCallbacks = new Map() // requestId → callback

function fetchMedia(mediaId, cb) {
  if (state.mediaCache.has(mediaId)) { cb(state.mediaCache.get(mediaId)); return }
  const id = 'media-' + mediaId
  pendingMediaCallbacks.set(id, cb)
  postToApp('REST_REQUEST', {
    id,
    method: 'GET',
    path: `/api/media/${mediaId}`,
  })
}

function handleMediaResponse(msg) {
  const cb = pendingMediaCallbacks.get(msg.id)
  if (!cb) return
  pendingMediaCallbacks.delete(msg.id)
  if (msg.error || !msg.data) { cb(null); return }
  // data may have a url field
  const url = msg.data.url || msg.data.location || null
  const mediaId = msg.id.replace('media-', '')
  state.mediaCache.set(mediaId, url)
  cb(url)
}

// ─────────────────────────────────────────────
//  Init & render
// ─────────────────────────────────────────────
function init() {
  hideLoading()

  if (!state.questions || state.questions.length === 0) {
    showError('No content blocks found for this activity.')
    return
  }

  // Set activity label
  const label = (state.activity && state.activity.name) || 'Onboarding'
  document.getElementById('activity-label').textContent = label

  renderProgress()
  renderQuestion(state.currentIndex)
}

function renderProgress() {
  const dots = document.getElementById('progress-dots')
  dots.innerHTML = ''
  state.questions.forEach((_, i) => {
    const d = document.createElement('div')
    d.className = 'dot' + (i === state.currentIndex ? ' active' : i < state.currentIndex ? ' done' : '')
    dots.appendChild(d)
  })
  // Back button
  const back = document.createElement('button')
  back.id = 'back-btn'
  back.textContent = '‹'
  back.title = 'Close'
  back.onclick = () => postToApp('QUIT', { completeState: 'INCOMPLETE' })
  dots.appendChild(back)
}

function renderQuestion(idx) {
  const q = state.questions[idx]
  if (!q) return

  const area = document.getElementById('content-area')
  area.innerHTML = ''
  area.className = 'slide-in'
  // reset animation
  void area.offsetWidth

  setFeedback('')
  updateContinueBtn()

  if (q.type === 'IMAGE_CONTENT') renderImageContent(q, area)
  else renderChoiceContent(q, area)
}

// ── IMAGE_CONTENT ──
function renderImageContent(q, area) {
  const wrap = document.createElement('div')
  wrap.className = 'image-block'

  // Top image (thumbnail)
  if (q.image) {
    const lbl = document.createElement('div')
    lbl.className = 'image-label'
    lbl.textContent = 'Image from content block'
    wrap.appendChild(lbl)

    const thumb = document.createElement('div')
    thumb.className = 'image-thumbnail'
    thumb.appendChild(imagePlaceholderSVG())
    wrap.appendChild(thumb)

    fetchMedia(q.image, url => {
      if (!url) return
      const img = document.createElement('img')
      img.src = url
      img.alt = q.text || ''
      thumb.innerHTML = ''
      thumb.appendChild(img)
    })
  }

  // Background card with text overlay (the lower section from the wireframe)
  if (q.text) {
    const card = document.createElement('div')
    card.className = 'image-bg-card'

    if (q.image) {
      // reuse same image as background
      const existing = state.mediaCache.get(q.image)
      if (existing) {
        const bg = document.createElement('img')
        bg.className = 'bg-img'
        bg.src = existing
        card.appendChild(bg)
        const ov = document.createElement('div')
        ov.className = 'image-bg-overlay'
        card.appendChild(ov)
      } else {
        fetchMedia(q.image, url => {
          if (!url) return
          const bg = document.createElement('img')
          bg.className = 'bg-img'
          bg.src = url
          card.insertBefore(bg, card.firstChild)
          const ov = document.createElement('div')
          ov.className = 'image-bg-overlay'
          card.insertBefore(ov, card.children[1] || null)
        })
      }
    } else {
      // Plain overlay without image
      const ov = document.createElement('div')
      ov.className = 'image-bg-overlay'
      card.appendChild(ov)
    }

    const txt = document.createElement('div')
    txt.className = 'image-bg-text'
    txt.textContent = q.text
    card.appendChild(txt)
    wrap.appendChild(card)
  }

  area.appendChild(wrap)

  // IMAGE_CONTENT needs no selection — continue always active
  updateContinueBtn(true)
}

// ── MULTICHOICE / MULTISELECT ──
function renderChoiceContent(q, area) {
  const wrap = document.createElement('div')
  wrap.className = 'choice-block'

  // Face label (the question text shown in a box at top)
  if (q.text) {
    const lbl = document.createElement('div')
    lbl.className = 'choice-face-label'
    lbl.textContent = q.text
    wrap.appendChild(lbl)
  }

  // Image (thumbnail above options)
  if (q.image) {
    const lbl2 = document.createElement('div')
    lbl2.className = 'image-label'
    lbl2.textContent = 'Image from content block'
    wrap.insertBefore(lbl2, wrap.firstChild)

    const thumb = document.createElement('div')
    thumb.className = 'image-thumbnail'
    thumb.style.marginBottom = '8px'
    thumb.appendChild(imagePlaceholderSVG())
    wrap.insertBefore(thumb, lbl2.nextSibling)

    fetchMedia(q.image, url => {
      if (!url) return
      const img = document.createElement('img')
      img.src = url
      img.alt = ''
      thumb.innerHTML = ''
      thumb.appendChild(img)
    })
  }

  // Init selection state
  if (!state.selections.has(q._id)) {
    state.selections.set(q._id, { type: q.type, selected: new Set() })
  }
  const sel = state.selections.get(q._id)

  // Options
  ;(q.options || []).forEach(opt => {
    const btn = document.createElement('button')

    if (q.type === 'MULTISELECT') {
      btn.className = 'option-btn multiselect' + (sel.selected.has(opt._id) ? ' selected' : '')
      const check = document.createElement('div')
      check.className = 'check-icon'
      const txt = document.createElement('span')
      txt.className = 'option-text'
      txt.textContent = opt.label || opt.text
      btn.appendChild(check)
      btn.appendChild(txt)
    } else {
      btn.className = 'option-btn' + (sel.selected.has(opt._id) ? ' selected' : '')
      btn.textContent = opt.label || opt.text
    }

    btn.addEventListener('click', () => {
      if (q.type === 'MULTICHOICE') {
        sel.selected.clear()
        sel.selected.add(opt._id)
        // update all btns
        wrap.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'))
        btn.classList.add('selected')
      } else {
        // MULTISELECT toggle
        if (sel.selected.has(opt._id)) {
          sel.selected.delete(opt._id)
          btn.classList.remove('selected')
        } else {
          sel.selected.add(opt._id)
          btn.classList.add('selected')
        }
      }
      updateContinueBtn()
    })

    wrap.appendChild(btn)
  })

  area.appendChild(wrap)
}

// ─────────────────────────────────────────────
//  Continue / submission
// ─────────────────────────────────────────────
function updateContinueBtn(forceActive) {
  const btn = document.getElementById('continue-btn')
  const q = state.questions[state.currentIndex]
  if (!q) return

  let active = forceActive
  if (!active) {
    if (q.type === 'IMAGE_CONTENT') {
      active = true
    } else {
      const sel = state.selections.get(q._id)
      active = sel && sel.selected.size > 0
    }
  }
  btn.className = active ? 'active' : ''
}

document.getElementById('continue-btn').addEventListener('click', () => {
  const q = state.questions[state.currentIndex]
  if (!q) return

  if (q.type === 'IMAGE_CONTENT') {
    // IMAGE_CONTENT — just advance
    advance()
    return
  }

  const sel = state.selections.get(q._id)
  if (!sel || sel.selected.size === 0) return

  const ids = [...sel.selected]

  if (q.type === 'MULTICHOICE') {
    postToApp('QUESTION_RESPONSE', {
      index: state.currentIndex,
      option: { _id: ids[0] },
    })
  } else {
    postToApp('QUESTION_RESPONSE', {
      index: state.currentIndex,
      options: ids.map(_id => ({ _id })),
    })
  }
})

function handleAnswerResult(data) {
  // Show brief feedback then advance
  if (data && data.correct !== undefined) {
    setFeedback(data.correct ? '✓ Correct!' : 'Moving on…')
    setTimeout(advance, 600)
  } else {
    advance()
  }
}

function advance() {
  if (state.currentIndex < state.questions.length - 1) {
    state.currentIndex++
    renderProgress()
    renderQuestion(state.currentIndex)
  } else {
    // All done
    postToApp('QUIT', { completeState: 'COMPLETE' })
  }
}

// ─────────────────────────────────────────────
//  UI helpers
// ─────────────────────────────────────────────
function hideLoading() {
  document.getElementById('loading').style.display = 'none'
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg
  const ev = document.getElementById('error-view')
  ev.style.display = 'flex'
}

function setFeedback(text) {
  document.getElementById('feedback-banner').textContent = text
}

function imagePlaceholderSVG() {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
  svg.setAttribute('viewBox', '0 0 80 60')
  svg.setAttribute('width', '80')
  svg.setAttribute('height', '60')
  svg.innerHTML = `
    <rect width="80" height="60" rx="6" fill="#c8c8c8"/>
    <rect x="8" y="8" width="64" height="44" rx="4" fill="#b0b0b0"/>
    <circle cx="26" cy="22" r="6" fill="#e0e0e0"/>
    <polygon points="10,52 30,28 50,40 62,30 70,52" fill="#c0c0c0"/>
  `
  const wrap = document.createElement('div')
  wrap.className = 'image-placeholder'
  wrap.appendChild(svg)
  return wrap
}

// ─────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────
postToApp('READY_DYNAMIC_MEDIA')
</script>
</body>
</html>
