<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Audio Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f14;
      --surface:      #1a1a24;
      --surface-2:    #24243a;
      --accent:       #7c6aff;
      --accent-light: #a695ff;
      --text:         #f0f0f8;
      --text-muted:   #9090b0;
      --radius:       16px;
      --radius-sm:    8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* ── Shell: full height, flex column ────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── Top spacer — 100 px ─────────────────────────────────────────── */
    #top-spacer { height: 100px; flex-shrink: 0; }

    /* ── Header ──────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 14px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text);
    }
    #close-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    #close-btn:hover  { background: var(--surface); color: var(--text); }
    #close-btn:active { transform: scale(0.92); }

    /* ── Now-Playing Hero (fixed, non-scrolling) ─────────────────────── */
    #now-playing {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 16px;
    }

    #album-art {
      width: 180px; height: 180px;
      border-radius: var(--radius);
      object-fit: cover;
      background: var(--surface-2);
      box-shadow: 0 20px 56px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
      flex-shrink: 0;
    }
    #album-art.playing { transform: scale(1.05); }

    #album-art-placeholder {
      width: 180px; height: 180px;
      border-radius: var(--radius);
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 20px 56px rgba(0,0,0,0.6);
    }
    #album-art-placeholder svg { opacity: 0.25; }

    #track-info {
      margin-top: 16px;
      text-align: center;
      width: 100%;
      padding: 0 8px;
    }
    #track-title {
      font-size: 18px; font-weight: 700; line-height: 1.3;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #track-index { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Hidden SoundCloud iframe ────────────────────────────────────── */
    #sc-container { width: 100%; height: 0; overflow: hidden; }
    #sc-iframe { width: 100%; height: 166px; border: none; }

    /* ── Controls ────────────────────────────────────────────────────── */
    #controls {
      display: flex; align-items: center; justify-content: center;
      gap: 24px;
      margin-top: 18px;
      flex-shrink: 0;
      padding: 0 24px;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, transform 0.15s;
      border-radius: 50%; padding: 6px;
    }
    .ctrl-btn:hover  { color: var(--text); transform: scale(1.1); }
    .ctrl-btn:active { transform: scale(0.9); }

    #play-pause-btn {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(124,106,255,0.5);
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    #play-pause-btn:hover  { background: var(--accent-light); transform: scale(1.05); }
    #play-pause-btn:active { transform: scale(0.95); }

    /* ── Progress bar ────────────────────────────────────────────────── */
    #progress-section {
      width: 100%; padding: 14px 24px 0; flex-shrink: 0;
    }
    #progress-track {
      position: relative; width: 100%; height: 4px;
      background: var(--surface-2); border-radius: 2px;
      cursor: pointer; margin: 10px 0;
    }
    #progress-track::before {
      content: ''; position: absolute; inset: -10px 0;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: var(--accent); border-radius: 2px;
      pointer-events: none;
    }
    #progress-thumb {
      position: absolute; top: 50%; left: 0%;
      transform: translate(-50%, -50%) scale(0);
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.25);
      pointer-events: none;
      transition: transform 0.15s;
    }
    #progress-track:hover #progress-thumb,
    #progress-track.scrubbing #progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }
    #progress-times {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text-muted);
      margin-top: 2px; user-select: none;
    }

    /* ── Playlist — scrollable, fills remaining space ────────────────── */
    #playlist-section {
      flex: 1;
      min-height: 0;          /* required: lets flex child shrink & scroll  */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px 0;
      border-top: 1px solid var(--surface-2);
      margin-top: 14px;
    }
    #playlist-section::-webkit-scrollbar { display: none; }

    #playlist-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px 10px;
    }

    #playlist { display: flex; flex-direction: column; gap: 6px; }

    .track-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s;
      border: 1.5px solid transparent;
    }
    .track-item:active { transform: scale(0.98); }
    .track-item.active {
      border-color: var(--accent);
      background: rgba(124,106,255,0.12);
    }

    .track-thumb {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      object-fit: cover; flex-shrink: 0;
    }
    .track-thumb-ph {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .track-meta { flex: 1; overflow: hidden; }
    .track-name {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .track-num { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .eq-bars {
      display: flex; align-items: flex-end;
      gap: 2px; height: 16px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.2s;
    }
    .track-item.active .eq-bars { opacity: 1; }
    .eq-bar {
      width: 3px; border-radius: 2px;
      background: var(--accent);
      animation: eq 0.6s ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    .eq-bar:nth-child(1) { animation-duration: 0.50s; }
    .eq-bar:nth-child(2) { animation-duration: 0.70s; }
    .eq-bar:nth-child(3) { animation-duration: 0.45s; }
    @keyframes eq { from { height: 4px; } to { height: 14px; } }
    .eq-bars.paused .eq-bar { animation-play-state: paused; height: 8px; }

    /* ── Bottom spacer — 300 px ──────────────────────────────────────── */
    #bottom-spacer { height: 300px; flex-shrink: 0; }

    /* ── Loading / Error overlays ────────────────────────────────────── */
    #loading-screen, #error-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; background: var(--bg); z-index: 10;
    }
    #error-screen { display: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--surface-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-screen p, #error-screen p {
      color: var(--text-muted); font-size: 14px;
      text-align: center; max-width: 260px; line-height: 1.5;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Overlays -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Loading playlist…</p>
  </div>
  <div id="error-screen">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7c6aff" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="13"/>
      <circle cx="12" cy="16.5" r="0.6" fill="#7c6aff"/>
    </svg>
    <p id="error-msg">No audio tracks found.</p>
  </div>

  <!-- 100 px top spacing -->
  <div id="top-spacer"></div>

  <!-- Header -->
  <div id="header">
    <h1 id="activity-title">Audio Player</h1>
    <button id="close-btn" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="1" y1="1" x2="13" y2="13"/>
        <line x1="13" y1="1" x2="1" y2="13"/>
      </svg>
    </button>
  </div>

  <!-- Now Playing -->
  <div id="now-playing">
    <img id="album-art" style="display:none" alt="Album art" />
    <div id="album-art-placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3" fill="#fff" stroke="none"/>
        <circle cx="12" cy="12" r="6.5" stroke-dasharray="2 3"/>
      </svg>
    </div>

    <div id="track-info">
      <div id="track-title">—</div>
      <div id="track-index"></div>
    </div>

    <!-- Hidden SoundCloud iframe -->
    <div id="sc-container">
      <iframe id="sc-iframe" allow="autoplay" src="about:blank"></iframe>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button class="ctrl-btn" id="prev-btn" aria-label="Previous">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button id="play-pause-btn" aria-label="Play / Pause">
        <svg id="icon-play"  width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="white" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button class="ctrl-btn" id="next-btn" aria-label="Next">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Progress bar -->
  <div id="progress-section">
    <div id="progress-track">
      <div id="progress-fill"></div>
      <div id="progress-thumb"></div>
    </div>
    <div id="progress-times">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <!-- Playlist — fills remaining height and scrolls -->
  <div id="playlist-section">
    <div id="playlist-label">Tracks</div>
    <div id="playlist"></div>
  </div>

  <!-- 300 px bottom spacing -->
  <div id="bottom-spacer"></div>

</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  API: null, USER: null, TEMPLATE: null, TEMPLATE_VARIATION: null,
  AUTH: null, ACTIVITY: null, ACTIVITY_RESPONSE: null, CONFIG: {},
  QUESTIONS: null,
  _received: new Set(),
}

let tracks        = []
let currentIdx    = 0
let isPlaying     = false
let widget        = null
let widgetReady   = false
let progressRaf   = null
let trackDuration = 0

// ─── REST_REQUEST helper ──────────────────────────────────────────────────────
let _reqCounter = 0
const _pending  = {}

function restRequest(method, model, data) {
  return new Promise((resolve, reject) => {
    const id   = 'req-' + (++_reqCounter)
    _pending[id] = { resolve, reject }
    const text = JSON.stringify({
      key: 'REST_REQUEST',
      method,
      model,
      data,
      id,
      specialParams: null,
    })
    if (isNative) window.ReactNativeWebView.postMessage(text)
    else          window.parent.postMessage(text, '*')
  })
}

// ─── postMessage bridge ───────────────────────────────────────────────────────
const isNative = typeof window.ReactNativeWebView !== 'undefined'

function postToApp(key, data = null) {
  const text = JSON.stringify({ key, data })
  if (isNative) window.ReactNativeWebView.postMessage(text)
  else          window.parent.postMessage(text, '*')
}

function onMessage(event) {
  try {
    const msg = JSON.parse(event.data)
    if (!msg || !msg.key) return
    handleMessage(msg)
  } catch (_) {}
}
document.addEventListener('message', onMessage)
window.addEventListener('message', onMessage)

// ─── Message handler ──────────────────────────────────────────────────────────
function handleMessage(msg) {
  const { key, data, id, error } = msg

  // Route REST responses to pending promises
  if (key === 'REQUEST_RESPONSE') {
    const p = _pending[id]
    if (p) {
      delete _pending[id]
      error ? p.reject(new Error(error)) : p.resolve(data)
    }
    return
  }

  switch (key) {
    case 'API':                state.API                = data; break
    case 'USER':               state.USER               = data; break
    case 'TEMPLATE':           state.TEMPLATE           = data; break
    case 'TEMPLATE_VARIATION': state.TEMPLATE_VARIATION = data; break
    case 'AUTH':               state.AUTH               = data; break
    case 'ACTIVITY':           state.ACTIVITY           = data; break
    case 'ACTIVITY_RESPONSE':  state.ACTIVITY_RESPONSE  = data; break
    case 'USER_ACTIVITY':      break
    case 'CONFIG':             state.CONFIG             = data || {}; break
    case 'CONTENT':            break
    case 'QUESTION':           break
    case 'QUESTIONS':
      state.QUESTIONS = data || []
      state._received.add('QUESTIONS')
      break
    default: break
  }

  if (state._received.has('QUESTIONS')) maybeStart()
}

// ─── Start ────────────────────────────────────────────────────────────────────
let started = false

function maybeStart() {
  if (started) return
  started = true
  boot().catch(e => showError('Failed to load playlist: ' + e.message))
}

async function boot() {
  if (state.ACTIVITY?.name) {
    document.getElementById('activity-title').textContent = state.ACTIVITY.name
  }

  const raw = parseTracksFromQuestions(state.QUESTIONS)

  if (raw.length === 0) {
    showError('No audio tracks found. Make sure each TEXT_CONTENT question has a SoundCloud URL as its body text.')
    return
  }

  // Resolve image IDs → URLs via the File model
  tracks = await resolveArtwork(raw)

  buildPlaylist()
  loadTrack(0, false)
  hideLoading()
}

// ─── Parse questions ──────────────────────────────────────────────────────────
// Each TEXT_CONTENT question = one track:
//   q.label      → track title (the Label / data key set in Creator)
//   q.image      → File ID — resolved to URL via restRequest('get', 'File', id)
//   q.imageMedia → {id, url} already resolved (mobile READY flow only)
//   q.text       → SoundCloud URL (body text of the content block)
//
function parseTracksFromQuestions(questions) {
  if (!questions?.length) return []

  const sorted = [...questions].sort((a, b) => (a.order ?? 0) - (b.order ?? 0))
  const result = []

  for (const q of sorted) {
    if (q.type !== 'TEXT_CONTENT') continue

    const rawText = (q.text || '').replace(/<[^>]+>/g, '').trim()
    if (!isSoundCloudUrl(rawText)) continue

    const title    = (q.label || '').trim() || `Track ${result.length + 1}`
    // imageMedia.url is only set when using READY (full preload) — not READY_DYNAMIC_MEDIA
    const artUrl   = q.imageMedia?.url || null
    // q.image is the File record ID string when artUrl isn't already resolved
    const imageId  = artUrl ? null : (q.image || null)

    result.push({ title, artUrl, imageId, scUrl: rawText })
  }

  return result
}

// ─── Resolve image IDs → URLs via File model ─────────────────────────────────
async function resolveArtwork(rawTracks) {
  return Promise.all(rawTracks.map(async t => {
    if (t.artUrl || !t.imageId) return t
    try {
      // Correct format: method='get', model='File', data=<the file ID string>
      const file = await restRequest('get', 'File', t.imageId)
      return { ...t, artUrl: file?.url || null }
    } catch (_) {
      return { ...t, artUrl: null }
    }
  }))
}

function isSoundCloudUrl(str) {
  return /soundcloud\.com\//i.test(str || '')
}

// ─── Playlist ─────────────────────────────────────────────────────────────────
function buildPlaylist() {
  const container = document.getElementById('playlist')
  container.innerHTML = ''

  tracks.forEach((track, idx) => {
    const item = document.createElement('div')
    item.className = 'track-item'

    // Thumbnail
    if (track.artUrl) {
      const img     = document.createElement('img')
      img.src       = track.artUrl
      img.className = 'track-thumb'
      img.alt       = ''
      img.onerror   = () => img.replaceWith(makePlaceholderThumb())
      item.appendChild(img)
    } else {
      item.appendChild(makePlaceholderThumb())
    }

    // Title + number
    const meta = document.createElement('div')
    meta.className = 'track-meta'
    meta.innerHTML = `
      <div class="track-name">${esc(track.title)}</div>
      <div class="track-num">Track ${idx + 1}</div>`
    item.appendChild(meta)

    // Equaliser
    const eq = document.createElement('div')
    eq.className = 'eq-bars paused'
    eq.innerHTML = '<div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>'
    item.appendChild(eq)

    item.addEventListener('click', () => {
      if (idx === currentIdx) togglePlay()
      else loadTrack(idx, true)
    })

    container.appendChild(item)
  })
}

function makePlaceholderThumb() {
  const ph = document.createElement('div')
  ph.className = 'track-thumb-ph'
  ph.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9090b0" stroke-width="1.5">
    <circle cx="12" cy="12" r="9"/>
    <circle cx="12" cy="12" r="3" fill="#9090b0" stroke="none"/>
  </svg>`
  return ph
}

function updatePlaylistActive() {
  document.querySelectorAll('.track-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === currentIdx)
    const eq = el.querySelector('.eq-bars')
    if (eq) eq.classList.toggle('paused', !(isPlaying && idx === currentIdx))
  })
}

// ─── Track loading ────────────────────────────────────────────────────────────
function loadTrack(idx, autoplay) {
  currentIdx    = idx
  const track   = tracks[idx]

  // Hero art
  const artEl = document.getElementById('album-art')
  const phEl  = document.getElementById('album-art-placeholder')
  if (track.artUrl) {
    artEl.src           = track.artUrl
    artEl.style.display = 'block'
    artEl.classList.remove('playing')
    phEl.style.display  = 'none'
    artEl.onerror = () => { artEl.style.display = 'none'; phEl.style.display = 'flex' }
  } else {
    artEl.style.display = 'none'
    phEl.style.display  = 'flex'
  }

  document.getElementById('track-title').textContent = track.title
  document.getElementById('track-index').textContent = `Track ${idx + 1} of ${tracks.length}`

  // Swap SoundCloud embed
  document.getElementById('sc-iframe').src = buildSCEmbedUrl(track.scUrl, autoplay)

  isPlaying     = autoplay
  widgetReady   = false
  trackDuration = 0
  setProgress(0)
  setTimeCurrent(0)
  setTimeTotal(0)
  stopProgressPolling()
  updatePlayIcon()
  updatePlaylistActive()

  setTimeout(bindWidget, 800)
}

function buildSCEmbedUrl(scUrl, autoplay) {
  const enc = encodeURIComponent(scUrl)
  return `https://w.soundcloud.com/player/?url=${enc}&color=%237c6aff&auto_play=${autoplay}&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false`
}

// ─── SoundCloud Widget ────────────────────────────────────────────────────────
function bindWidget() {
  try {
    widget = SC.Widget(document.getElementById('sc-iframe'))

    widget.bind(SC.Widget.Events.READY, () => {
      widgetReady = true
      widget.getDuration(d => { trackDuration = d || 0; setTimeTotal(trackDuration) })
      if (isPlaying) widget.play()
      syncArtScale()
    })
    widget.bind(SC.Widget.Events.PLAY, () => {
      isPlaying = true
      updatePlayIcon(); updatePlaylistActive(); syncArtScale()
      startProgressPolling()
    })
    widget.bind(SC.Widget.Events.PAUSE, () => {
      isPlaying = false
      updatePlayIcon(); updatePlaylistActive(); syncArtScale()
      stopProgressPolling()
    })
    widget.bind(SC.Widget.Events.FINISH, () => {
      isPlaying = false
      updatePlayIcon(); updatePlaylistActive(); syncArtScale()
      stopProgressPolling(); setProgress(1)
      if (currentIdx < tracks.length - 1) {
        setTimeout(() => loadTrack(currentIdx + 1, true), 600)
      }
    })
  } catch (_) {}
}

// ─── Progress ─────────────────────────────────────────────────────────────────
function startProgressPolling() {
  stopProgressPolling()
  function tick() {
    if (!widget || !widgetReady) return
    widget.getPosition(pos => {
      if (trackDuration > 0) setProgress(pos / trackDuration)
      setTimeCurrent(pos)
    })
    progressRaf = requestAnimationFrame(tick)
  }
  progressRaf = requestAnimationFrame(tick)
}
function stopProgressPolling() {
  if (progressRaf) { cancelAnimationFrame(progressRaf); progressRaf = null }
}
function setProgress(ratio) {
  const pct = Math.min(Math.max(ratio * 100, 0), 100)
  document.getElementById('progress-fill').style.width = pct + '%'
  document.getElementById('progress-thumb').style.left = pct + '%'
}
function setTimeCurrent(ms) { document.getElementById('time-current').textContent = fmt(ms) }
function setTimeTotal(ms)   { document.getElementById('time-total').textContent   = fmt(ms) }
function fmt(ms) {
  const s = Math.floor((ms || 0) / 1000)
  return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`
}

// ─── Scrubber ─────────────────────────────────────────────────────────────────
;(function() {
  const track = document.getElementById('progress-track')
  let scrubbing = false
  function scrubTo(x) {
    const r = track.getBoundingClientRect()
    const ratio = Math.min(Math.max((x - r.left) / r.width, 0), 1)
    setProgress(ratio); setTimeCurrent(ratio * trackDuration)
    if (widget && widgetReady && trackDuration > 0) widget.seekTo(ratio * trackDuration)
  }
  track.addEventListener('touchstart',  e => { scrubbing = true;  track.classList.add('scrubbing');    scrubTo(e.touches[0].clientX) }, { passive: true })
  track.addEventListener('touchmove',   e => { if (scrubbing) scrubTo(e.touches[0].clientX) },         { passive: true })
  track.addEventListener('touchend',    () => { scrubbing = false; track.classList.remove('scrubbing') })
  track.addEventListener('mousedown',   e => { scrubbing = true;  track.classList.add('scrubbing');    scrubTo(e.clientX) })
  window.addEventListener('mousemove',  e => { if (scrubbing) scrubTo(e.clientX) })
  window.addEventListener('mouseup',    () => { if (scrubbing) { scrubbing = false; track.classList.remove('scrubbing') } })
})()

// ─── Helpers ──────────────────────────────────────────────────────────────────
function togglePlay() {
  if (!widget || !widgetReady) return
  isPlaying ? widget.pause() : widget.play()
}
function syncArtScale() {
  document.getElementById('album-art').classList.toggle('playing', isPlaying)
}
function updatePlayIcon() {
  document.getElementById('icon-play').style.display  = isPlaying ? 'none'  : 'block'
  document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none'
}
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}
function hideLoading() {
  const s = document.getElementById('loading-screen')
  s.style.transition = 'opacity 0.3s'; s.style.opacity = '0'
  setTimeout(() => s.style.display = 'none', 300)
}
function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none'
  document.getElementById('error-msg').textContent = msg
  document.getElementById('error-screen').style.display = 'flex'
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('play-pause-btn').addEventListener('click', togglePlay)
document.getElementById('prev-btn').addEventListener('click', () => loadTrack(currentIdx > 0 ? currentIdx - 1 : tracks.length - 1, isPlaying))
document.getElementById('next-btn').addEventListener('click', () => loadTrack(currentIdx < tracks.length - 1 ? currentIdx + 1 : 0, isPlaying))
document.getElementById('close-btn').addEventListener('click', () => postToApp('QUIT', { completeState: 'COMPLETE' }))

// ─── Boot ─────────────────────────────────────────────────────────────────────
postToApp('READY_DYNAMIC_MEDIA')
</script>
</body>
</html>
