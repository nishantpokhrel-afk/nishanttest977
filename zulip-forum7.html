<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Zulip Forum</title>
<style>
  :root {
    --color-primary:    #5b5ea6;
    --color-secondary:  #7c7fba;
    --color-dark:       #1a1a2e;
    --color-light:      #f4f4f8;
    --color-background: #ffffff;
    --color-surface:    #f8f8fc;
    --color-border:     #e2e2ee;
    --color-text:       #1a1a2e;
    --color-muted:      #8888a8;
    --color-error:      #d94040;
    --border-radius:    10px;
    --font-family:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-family);
    background: var(--color-background);
    color: var(--color-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--color-primary);
    color: #fff;
    flex-shrink: 0;
  }
  #header-title { font-size: 16px; font-weight: 600; }
  #header-sub   { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  #done-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  #done-btn:active { opacity: 0.7; }

  /* ── Stream/topic bar ── */
  #topic-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    font-size: 13px;
    color: var(--color-muted);
    flex-shrink: 0;
  }
  #topic-bar strong { color: var(--color-text); }

  /* ── Message feed ── */
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .message-item {
    display: flex;
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--color-primary);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .message-body { flex: 1; min-width: 0; }
  .message-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
  }
  .message-sender { font-size: 13px; font-weight: 600; }
  .message-time   { font-size: 11px; color: var(--color-muted); }
  .message-text   { font-size: 14px; line-height: 1.5; word-break: break-word; }

  /* own message highlight */
  .message-item.own .avatar   { background: var(--color-secondary); }
  .message-item.own .message-sender { color: var(--color-primary); }

  /* ── Empty / loading / error states ── */
  #state-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--color-background);
    z-index: 10;
    padding: 32px;
    text-align: center;
  }
  #state-overlay.hidden { display: none; }
  #state-icon  { font-size: 36px; }
  #state-title { font-size: 16px; font-weight: 600; color: var(--color-text); }
  #state-msg   { font-size: 13px; color: var(--color-muted); }
  #retry-btn {
    margin-top: 8px;
    padding: 10px 24px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: var(--border-radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ── Compose bar ── */
  #compose {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--color-border);
    background: var(--color-background);
    flex-shrink: 0;
  }
  #compose-input {
    flex: 1;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    padding: 10px 12px;
    font-size: 14px;
    font-family: var(--font-family);
    resize: none;
    outline: none;
    max-height: 100px;
    background: var(--color-surface);
    color: var(--color-text);
    line-height: 1.4;
  }
  #compose-input:focus { border-color: var(--color-primary); }
  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--color-primary);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn:active:not(:disabled) { transform: scale(0.93); }

  /* ── Sending indicator ── */
  .sending-tag {
    font-size: 11px;
    color: var(--color-muted);
    font-style: italic;
    padding: 2px 0;
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div>
    <div id="header-title">Community Forum</div>
    <div id="header-sub">#general</div>
  </div>
  <button id="done-btn" onclick="quit()">Done</button>
</div>

<!-- Stream / topic label -->
<div id="topic-bar">
  <span>💬</span>
  <span>Stream: <strong id="label-stream">—</strong> &nbsp;·&nbsp; Topic: <strong id="label-topic">—</strong></span>
</div>

<!-- Message feed -->
<div id="feed"></div>

<!-- Loading / error overlay -->
<div id="state-overlay">
  <div id="state-icon">⏳</div>
  <div id="state-title">Loading…</div>
  <div id="state-msg">Connecting to the forum</div>
  <button id="retry-btn" style="display:none" onclick="loadMessages()">Try Again</button>
</div>

<!-- Compose -->
<div id="compose">
  <textarea id="compose-input" placeholder="Write a message…" rows="1"
    oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  <button id="send-btn" onclick="sendMessage()" disabled>➤</button>
</div>

<script>
// ─────────────────────────────────────────────
// ACTIVITY CUSTOM CONFIG (reference)
// Paste this JSON into the Activity → Custom Config
// field in Cogniss Creator. Edit values per activity.
// ─────────────────────────────────────────────
const DEFAULT_CONFIG = {
  "zulipProxyUrl": "https://zulip-proxy.yourname.workers.dev", // Required — your Cloudflare Worker URL
  "zulipStream":   "general",                                  // Zulip stream name
  "zulipTopic":    "community-feed",                           // Zulip topic name
  "pageTitle":     "Community Forum"                           // Header title shown to user
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const state = {
  USER: null,
  CONFIG: {},
  ACTIVITY: null,
  ACTIVITY_RESPONSE: null,
  AUTH: null,
  API: null,
  ready: false,
  received: new Set()
}

const REQUIRED_KEYS = ['USER', 'CONFIG', 'ACTIVITY', 'ACTIVITY_RESPONSE']

let pollInterval = null
let lastMessageId = null
let sending = false

// ─────────────────────────────────────────────
// BRIDGE
// ─────────────────────────────────────────────
const isNative = typeof window.ReactNativeWebView !== 'undefined'

function postToApp(key, data = null) {
  const text = JSON.stringify({ key, data })
  if (isNative) window.ReactNativeWebView.postMessage(text)
  else window.parent.postMessage(text, '*')
}

function onMessage(event) {
  try {
    const msg = JSON.parse(event.data)
    if (!msg || !msg.key) return
    handleMessage(msg)
  } catch (e) {}
}
document.addEventListener('message', onMessage)
window.addEventListener('message', onMessage)

function handleMessage(msg) {
  switch (msg.key) {
    case 'USER':              state.USER = msg.data; break
    case 'CONFIG':            state.CONFIG = Object.assign({}, DEFAULT_CONFIG, msg.data || {}); break
    case 'ACTIVITY':          state.ACTIVITY = msg.data; break
    case 'ACTIVITY_RESPONSE': state.ACTIVITY_RESPONSE = msg.data; break
    case 'AUTH':              state.AUTH = msg.data; break
    case 'API':               state.API = msg.data; break
  }
  state.received.add(msg.key)
  if (!state.ready && REQUIRED_KEYS.every(k => state.received.has(k))) {
    state.ready = true
    startTemplate()
  }
}

// Signal ready
postToApp('READY_DYNAMIC_MEDIA')

// ─────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────
function applyTheme(theme) {
  if (!theme) return
  const r = document.documentElement
  const c = theme.colors || {}
  if (c.primary)   r.style.setProperty('--color-primary',   c.primary)
  if (c.secondary) r.style.setProperty('--color-secondary', c.secondary)
  if (c.dark)      r.style.setProperty('--color-dark',      c.dark)
  if (c.light)     r.style.setProperty('--color-background',c.light)
  const radiusMap = { NONE: '0px', SMALL: '4px', MEDIUM: '8px', LARGE: '16px', FULL: '9999px' }
  if (theme.rounded) r.style.setProperty('--border-radius', radiusMap[theme.rounded] || '10px')
}

// ─────────────────────────────────────────────
// TEMPLATE START
// ─────────────────────────────────────────────
async function startTemplate() {
  const cfg = state.CONFIG

  // Validate required config
  if (!cfg.zulipProxyUrl) {
    return showError('Missing config: zulipProxyUrl is required.')
  }

  // Apply theme if provided inline via CONFIG
  if (cfg.theme) applyTheme(cfg.theme)

  // Apply labels
  const streamName = cfg.zulipStream || 'general'
  const topicName  = cfg.zulipTopic  || 'community'
  document.getElementById('header-title').textContent = cfg.pageTitle  || 'Community Forum'
  document.getElementById('header-sub').textContent   = '#' + streamName
  document.getElementById('label-stream').textContent = streamName
  document.getElementById('label-topic').textContent  = topicName

  // Enable compose
  document.getElementById('compose-input').disabled = false
  document.getElementById('send-btn').disabled = false

  // Load messages
  await loadMessages()

  // Poll every 8 seconds
  pollInterval = setInterval(loadMessages, 8000)
}

// ─────────────────────────────────────────────
// ZULIP API (via proxy)
// ─────────────────────────────────────────────
function proxyUrl(path) {
  const base = (state.CONFIG.zulipProxyUrl || '').replace(/\/$/, '')
  return `${base}${path}`
}

async function zulipGet(path) {
  const res = await fetch(proxyUrl(path), {
    headers: { 'x-cogniss-user-id': state.USER?.id || '' }
  })
  if (!res.ok) throw new Error(`GET ${path} → ${res.status}`)
  return res.json()
}

async function zulipPost(path, params) {
  const body = new URLSearchParams(params)
  const res = await fetch(proxyUrl(path), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'x-cogniss-user-id': state.USER?.id || ''
    },
    body: body.toString()
  })
  if (!res.ok) throw new Error(`POST ${path} → ${res.status}`)
  return res.json()
}

// ─────────────────────────────────────────────
// LOAD MESSAGES
// ─────────────────────────────────────────────
async function loadMessages() {
  const { zulipStream, zulipTopic } = state.CONFIG
  const stream = zulipStream || 'general'
  const topic  = zulipTopic  || 'community'

  try {
    const narrow = JSON.stringify([
      { operator: 'stream', operand: stream },
      { operator: 'topic',  operand: topic  }
    ])
    const params = new URLSearchParams({
      anchor:     'newest',
      num_before: '50',
      num_after:  '0',
      narrow
    })

    const data = await zulipGet(`/api/v1/messages?${params}`)
    const messages = (data.messages || []).reverse() // oldest first

    renderMessages(messages)
    hideOverlay()
  } catch (err) {
    postToApp('LOG', { message: 'loadMessages error: ' + err.message })
    // Only show error overlay if feed is empty (first load failure)
    if (document.getElementById('feed').children.length === 0) {
      showError('Could not load messages. Check your connection.')
    }
  }
}

// ─────────────────────────────────────────────
// RENDER MESSAGES
// ─────────────────────────────────────────────
function renderMessages(messages) {
  const feed = document.getElementById('feed')
  const currentIds = new Set(
    Array.from(feed.querySelectorAll('.message-item')).map(el => el.dataset.id)
  )

  let appended = false
  const myDisplayName = state.USER?.displayName || ''

  for (const msg of messages) {
    const id = String(msg.id)
    if (currentIds.has(id)) continue

    // Parse "DisplayName: message body" format used when posting via bot
    let sender = msg.sender_full_name || 'Unknown'
    let body    = msg.content || ''

    // Strip HTML tags from Zulip's rendered content
    const tmp = document.createElement('div')
    tmp.innerHTML = body
    body = tmp.textContent || tmp.innerText || body

    // Detect own messages (posted with attribution prefix)
    const ownPrefix = myDisplayName + ': '
    const isOwn = body.startsWith(ownPrefix)
    if (isOwn) {
      sender = myDisplayName
      body   = body.slice(ownPrefix.length)
    }

    const initial = (sender[0] || '?').toUpperCase()
    const time    = formatTime(msg.timestamp)

    const el = document.createElement('div')
    el.className = 'message-item' + (isOwn ? ' own' : '')
    el.dataset.id = id
    el.innerHTML = `
      <div class="avatar">${initial}</div>
      <div class="message-body">
        <div class="message-meta">
          <span class="message-sender">${escHtml(sender)}</span>
          <span class="message-time">${time}</span>
        </div>
        <div class="message-text">${escHtml(body)}</div>
      </div>
    `
    feed.appendChild(el)
    appended = true
    lastMessageId = id
  }

  if (appended) {
    feed.scrollTop = feed.scrollHeight
  }

  // Show empty state if no messages at all
  if (feed.children.length === 0) {
    showState('💬', 'No messages yet', 'Be the first to post something!')
    document.getElementById('retry-btn').style.display = 'none'
  }
}

// ─────────────────────────────────────────────
// SEND MESSAGE
// ─────────────────────────────────────────────
async function sendMessage() {
  if (sending) return
  const input = document.getElementById('compose-input')
  const text  = input.value.trim()
  if (!text) return

  const displayName = state.USER?.displayName || 'Anonymous'
  const attributed  = `${displayName}: ${text}`

  input.value = ''
  autoResize(input)
  sending = true
  document.getElementById('send-btn').disabled = true

  // Optimistic UI — show message immediately
  const tempId = 'temp-' + Date.now()
  const feed = document.getElementById('feed')
  const tempEl = document.createElement('div')
  tempEl.className = 'message-item own'
  tempEl.dataset.id = tempId
  tempEl.innerHTML = `
    <div class="avatar">${(displayName[0] || '?').toUpperCase()}</div>
    <div class="message-body">
      <div class="message-meta">
        <span class="message-sender">${escHtml(displayName)}</span>
        <span class="message-time">sending…</span>
      </div>
      <div class="message-text">${escHtml(text)}</div>
    </div>
  `
  feed.appendChild(tempEl)
  feed.scrollTop = feed.scrollHeight
  hideOverlay()

  try {
    await zulipPost('/api/v1/messages', {
      type:    'stream',
      to:      state.CONFIG.zulipStream || 'general',
      topic:   state.CONFIG.zulipTopic  || 'community',
      content: attributed
    })

    // Remove optimistic item — next poll will fetch the real one
    tempEl.remove()
    await loadMessages()

    // Log participation in Cogniss (optional — records forum engagement)
    postToApp('LOG', { message: 'User posted to Zulip forum' })

  } catch (err) {
    tempEl.querySelector('.message-time').textContent = '⚠ Failed to send'
    tempEl.style.opacity = '0.6'
    postToApp('LOG', { message: 'sendMessage error: ' + err.message })
  } finally {
    sending = false
    document.getElementById('send-btn').disabled = false
  }
}

// ─────────────────────────────────────────────
// COMPLETION
// ─────────────────────────────────────────────
function quit() {
  if (pollInterval) clearInterval(pollInterval)
  postToApp('QUIT', { completeState: 'COMPLETE' })
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
function showState(icon, title, msg) {
  const overlay = document.getElementById('state-overlay')
  overlay.classList.remove('hidden')
  document.getElementById('state-icon').textContent  = icon
  document.getElementById('state-title').textContent = title
  document.getElementById('state-msg').textContent   = msg
}

function showError(msg) {
  showState('⚠️', 'Something went wrong', msg)
  document.getElementById('retry-btn').style.display = 'block'
}

function hideOverlay() {
  document.getElementById('state-overlay').classList.add('hidden')
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function formatTime(ts) {
  if (!ts) return ''
  const d = new Date(ts * 1000)
  const now = new Date()
  const isToday = d.toDateString() === now.toDateString()
  if (isToday) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' })
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 100) + 'px'
}

function handleKey(e) {
  // Send on Enter (not Shift+Enter) on desktop
  if (e.key === 'Enter' && !e.shiftKey && !isNative) {
    e.preventDefault()
    sendMessage()
  }
}
</script>
</body>
</html>
